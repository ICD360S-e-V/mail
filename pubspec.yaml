name: icd360s_mail_client
description: "ICD360S Mail Client - Modern email client with threat detection"
publish_to: 'none'

version: 2.151.2+1452

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:  # i18n support
    sdk: flutter

  # UI Framework
  # Microsoft Fluent Design for Windows. HARD-PINNED to <4.16.0 —
  # fluent_ui 4.16.0 uses Flutter 3.44+ APIs (ScrollCacheExtent,
  # ReorderableListView.onReorderItem) that don't exist in our pinned
  # Flutter 3.41.9. Dependabot bumped this in PR #136 despite Flutter
  # SDK skew; same explicit-range pattern as pdf/printing pins.
  # Re-bump only after upgrading Flutter SDK in CI.
  fluent_ui: '>=4.15.1 <4.16.0'

  # Email handling (IMAP/SMTP) - LOCAL FORK with mTLS support
  enough_mail:
    path: ./enough_mail_fork

  # OpenPGP E2EE (RFC 9580) — Ed25519 signing + X25519 encryption
  dart_pg: ^2.1.0
  # Native Go-based PGP encryption (ProtonMail go-crypto engine).
  # Used for encrypting large messages (attachments) — 50-200x faster
  # than dart_pg's pure Dart implementation. dart_pg retained for
  # decrypt, key generation, and key parsing.
  openpgp: ^3.10.7

  # State management
  provider: ^6.1.0

  # Utilities
  intl: 0.20.2  # Date formatting (pinned by Flutter SDK)
  crypto: ^3.0.0  # SHA-256 hashing for master password
  pointycastle: ^4.0.0  # AES-256-GCM for encrypted credential fallback storage (M4)
  # B5 (v2.30.0): Argon2id + HKDF + AES-GCM for the password-protected
  # MasterVault (lib/services/master_vault.dart). Verified publisher
  # dint.dev, Apache-2.0, 306 likes, native acceleration via
  # cryptography_flutter on iOS/Android/macOS (up to 100x faster).
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.2
  sodium: ^4.0.2  # libsodium: SecureKey with mlock + sodium_memzero for vault keys
  path: ^1.9.0  # Path manipulation
  flutter_secure_storage: ^10.3.1  # Secure password storage (Keychain/Credential Manager)
  http: ^1.2.0  # HTTP client for certificate download API
  path_provider: ^2.1.6  # Cross-platform app data directories

  # Icons
  cupertino_icons: ^1.0.9

  # Window management
  window_manager: ^0.5.1  # Window control (maximize, minimize, etc.)

  # Notifications (cross-platform)
  flutter_local_notifications: ^22.0.1  # Windows, macOS, Linux, Android, iOS

  # URL launcher (cross-platform)
  url_launcher: ^6.3.1  # Open URLs in external browser (all platforms)

  # File picker
  file_picker: ^11.0.2  # File selection for attachments
  flutter_widget_from_html_core: ^0.17.2  # Secure HTML email rendering (no WebView)

  # Printing
  # Native print dialog. HARD-PINNED to <5.15.0 — printing 5.15+ requires
  # Dart 3.12, our Flutter 3.41.9 ships Dart 3.11. Dependabot bumped this
  # to ^5.15.0 in PR #136 despite the pin comment, breaking CI right
  # after PR #137 fixed the same issue for `pdf`. Same explicit-range
  # pattern applied here — re-bump only after Flutter SDK upgrade in CI.
  printing: '>=5.14.3 <5.15.0'
  # PDF generation. HARD-PINNED to <3.13.0 — pdf 3.13+ requires Dart 3.12,
  # our pinned Flutter 3.41.9 ships Dart 3.11. Dependabot bumped this to
  # ^3.13.0 in PR #136 despite the pin comment and broke CI; reverted here.
  # Re-bump only after upgrading Flutter SDK in CI.
  pdf: '>=3.11.1 <3.13.0'

  # PDF Viewer - native PDFium rendering (no WebView dependency)
  pdfrx: ^2.4.4  # Native PDF viewer for Windows/macOS/Linux/Android/iOS

  # Document Scanner — flutter_edge_detection (2026-07-02).
  # Replaces the previous custom OpenCV pipeline (PR #135) which shipped
  # broken auto-detection AND wouldn't compile on Windows (opencv_dart
  # CMake `OpenCV_FOUND=FALSE`). This package wraps a native Kotlin/Java
  # implementation (no Google Play Services), so it works on
  # GrapheneOS Pixel where ML-Kit-based scanners (cunning_document_scanner
  # / flutter_doc_scanner) fail. Live camera edge detection + perspective
  # correction + built-in crop UI. Apache-2.0, published 3 months ago.
  flutter_edge_detection: ^1.2.0

  # NOTE: pdfrx uses PDFium natively, works on RDP sessions unlike WebView
  # Other storage uses pure Dart file I/O (hardcoded %APPDATA% paths)

  # Screenshot/screen recording prevention (Android FLAG_SECURE already set
  # natively; this adds iOS secure text field trick + Windows
  # SetWindowDisplayAffinity + macOS NSWindow.sharingType)
  no_screenshot: ^1.1.0

  # Root/jailbreak detection (mobile only, no external telemetry)
  safe_device: ^1.4.0

  # Sentry crash reporting + perf monitoring.
  # Self-hosted instance at https://sentry-mail.icd360s.de (project ID 3,
  # mail-client-app). PII scrubbed in beforeSend hook (lib/main.dart) —
  # NO IP, NO user email, NO request headers/cookies sent.
  sentry_flutter: ^9.22.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  msix: ^3.18.0  # Windows installer package

flutter:
  uses-material-design: true
  generate: true  # Enable gen-l10n for i18n
  assets:
    - assets/logo.png

msix_config:
  display_name: ICD360S Mail Client
  publisher_display_name: ICD360S e.V.
  publisher: CN=ICD360S
  identity_name: ICD360S.MailClient
  msix_version: 2.151.2.1452
  capabilities: internetClient
  protocol_activation: mailto




# lockfile-sync v3
