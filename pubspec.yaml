name: icd360s_mail_client
description: "ICD360S Mail Client - Modern email client with threat detection"
publish_to: 'none'

version: 2.90.5+1038

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:  # i18n support
    sdk: flutter

  # UI Framework
  fluent_ui: ^4.15.1  # Microsoft Fluent Design for Windows

  # Email handling (IMAP/SMTP) - LOCAL FORK with mTLS support
  enough_mail:
    path: ./enough_mail_fork

  # OpenPGP E2EE (RFC 9580) — Ed25519 signing + X25519 encryption
  dart_pg: ^2.1.0
  # Native Go-based PGP encryption (ProtonMail go-crypto engine).
  # Used for encrypting large messages (attachments) — 50-200x faster
  # than dart_pg's pure Dart implementation. dart_pg retained for
  # decrypt, key generation, and key parsing.
  openpgp: ^3.10.7

  # State management
  provider: ^6.1.0

  # Utilities
  intl: 0.20.2  # Date formatting (pinned by Flutter SDK)
  crypto: ^3.0.0  # SHA-256 hashing for master password
  pointycastle: ^4.0.0  # AES-256-GCM for encrypted credential fallback storage (M4)
  # B5 (v2.30.0): Argon2id + HKDF + AES-GCM for the password-protected
  # MasterVault (lib/services/master_vault.dart). Verified publisher
  # dint.dev, Apache-2.0, 306 likes, native acceleration via
  # cryptography_flutter on iOS/Android/macOS (up to 100x faster).
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.2
  sodium: ^4.0.2  # libsodium: SecureKey with mlock + sodium_memzero for vault keys
  path: ^1.9.0  # Path manipulation
  flutter_secure_storage: ^10.0.0  # Secure password storage (Keychain/Credential Manager)
  http: ^1.2.0  # HTTP client for certificate download API
  path_provider: ^2.1.5  # Cross-platform app data directories

  # Icons
  cupertino_icons: ^1.0.9

  # Window management
  window_manager: ^0.5.1  # Window control (maximize, minimize, etc.)

  # Notifications (cross-platform)
  flutter_local_notifications: ^18.0.1  # Windows, macOS, Linux, Android, iOS

  # URL launcher (cross-platform)
  url_launcher: ^6.3.1  # Open URLs in external browser (all platforms)

  # File picker
  file_picker: ^11.0.2  # File selection for attachments
  flutter_widget_from_html_core: ^0.17.2  # Secure HTML email rendering (no WebView)

  # Printing
  printing: ^5.13.4  # Native print dialog for all platforms including Windows
  pdf: ^3.11.1  # PDF generation for printing images

  # PDF Viewer - native PDFium rendering (no WebView dependency)
  pdfrx: ^1.0.100  # Native PDF viewer for Windows/macOS/Linux/Android/iOS

  # Document Scanner — primary: uses VisionKit on iOS, ML Kit on Android
  # (ML Kit requires Google Play Services — works on standard Android).
  cunning_document_scanner: ^1.4.0  # Auto-crop, edge detection, perspective correction
  # NOTE: edge_detection (WeScan/SmartPaperScan) was considered as a
  # GMS-free fallback for GrapheneOS, but the package is from 2023 and
  # doesn't set `namespace` in build.gradle, which breaks AGP 8.x. On
  # GrapheneOS users will get an error toast when they try to scan —
  # the "Choose File" option is always available as workaround.

  # NOTE: pdfrx uses PDFium natively, works on RDP sessions unlike WebView
  # NOTE: Using native webview plugin for integrated browser
  flutter_inappwebview: ^6.1.5
  # Other storage uses pure Dart file I/O (hardcoded %APPDATA% paths)

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  msix: ^3.16.0  # Windows installer package

flutter:
  uses-material-design: true
  generate: true  # Enable gen-l10n for i18n
  assets:
    - assets/logo.png

msix_config:
  display_name: ICD360S Mail Client
  publisher_display_name: ICD360S e.V.
  publisher: CN=ICD360S
  identity_name: ICD360S.MailClient
  msix_version: 2.90.5.1038
  capabilities: internetClient
  protocol_activation: mailto




