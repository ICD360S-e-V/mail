name: Build All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (comma-separated: linux,windows,macos,ios,android)'
        required: false
        default: 'all'

# Prevent duplicate runs - only one build per branch/PR at a time
# New push on same branch cancels the previous run
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.4'
  JAVA_VERSION: '17'
  APP_NAME: 'ICD360S Mail Client'
  APP_ID: 'de.icd360s.mailclient'

jobs:
  # ──────────────────────────────────────────────
  # Version extraction (shared by all jobs)
  # ──────────────────────────────────────────────
  version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      build_number: ${{ steps.ver.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: |
          FULL=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: //')
          echo "version=$(echo "$FULL" | cut -d'+' -f1)" >> "$GITHUB_OUTPUT"
          echo "build_number=$(echo "$FULL" | cut -d'+' -f2)" >> "$GITHUB_OUTPUT"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  LINUX
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-linux:
    name: Linux (tar.gz + deb + rpm + AppImage)
    needs: version
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.platforms, 'linux') ||
      contains(github.event.inputs.platforms, 'all')
    env:
      VER: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            dpkg-dev rpm fuse libfuse2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install enough_mail_fork dependencies
        run: flutter pub get
        working-directory: enough_mail_fork

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          cd build/linux/x64/release
          tar -czf "$GITHUB_WORKSPACE/ICD360S_MailClient_v${VER}_linux_x64.tar.gz" bundle/

      - name: Build .deb package
        run: |
          PKG_DIR="icd360s-mail_${VER}_amd64"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/lib/icd360s-mail"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/share/applications"
          mkdir -p "$PKG_DIR/usr/share/icons/hicolor/256x256/apps"

          # Copy built app
          cp -r build/linux/x64/release/bundle/* "$PKG_DIR/usr/lib/icd360s-mail/"

          # Symlink binary
          ln -sf /usr/lib/icd360s-mail/icd360s_mail_client "$PKG_DIR/usr/bin/icd360s-mail"

          # Desktop entry
          cat > "$PKG_DIR/usr/share/applications/icd360s-mail.desktop" << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=ICD360S Mail Client
          Comment=Modern email client with mTLS security
          Exec=icd360s-mail
          Icon=icd360s-mail
          Terminal=false
          Categories=Network;Email;
          MimeType=x-scheme-handler/mailto;
          DESKTOP
          sed -i 's/^          //' "$PKG_DIR/usr/share/applications/icd360s-mail.desktop"

          # Icon
          if [ -f assets/logo.png ]; then
            cp assets/logo.png "$PKG_DIR/usr/share/icons/hicolor/256x256/apps/icd360s-mail.png"
          fi

          # Control file
          cat > "$PKG_DIR/DEBIAN/control" << CTRL
          Package: icd360s-mail
          Version: ${VER}
          Architecture: amd64
          Maintainer: ICD360S e.V. <dev@icd360s.de>
          Description: ICD360S Mail Client
           Modern cross-platform email client with mTLS mutual authentication,
           threat detection, and end-to-end security for mail.icd360s.de.
          Section: mail
          Priority: optional
          Depends: libgtk-3-0, libblkid1, liblzma5
          CTRL
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"

          dpkg-deb --build "$PKG_DIR"
          mv "${PKG_DIR}.deb" "ICD360S_MailClient_v${VER}_linux_amd64.deb"

      - name: Build .rpm package
        run: |
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Create tarball source
          TAR_DIR="icd360s-mail-${VER}"
          mkdir -p "$TAR_DIR"
          cp -r build/linux/x64/release/bundle/* "$TAR_DIR/"
          tar -czf "rpmbuild/SOURCES/icd360s-mail-${VER}.tar.gz" "$TAR_DIR"
          rm -rf "$TAR_DIR"

          cat > rpmbuild/SPECS/icd360s-mail.spec << SPEC
          Name: icd360s-mail
          Version: ${VER}
          Release: 1
          Summary: ICD360S Mail Client
          License: Proprietary
          URL: https://icd360s.de
          Source0: icd360s-mail-${VER}.tar.gz

          %description
          Modern cross-platform email client with mTLS mutual authentication,
          threat detection, and end-to-end security for mail.icd360s.de.

          %install
          mkdir -p %{buildroot}/usr/lib/icd360s-mail
          mkdir -p %{buildroot}/usr/bin
          tar -xzf %{SOURCE0} -C %{buildroot}/usr/lib/icd360s-mail --strip-components=1
          ln -sf /usr/lib/icd360s-mail/icd360s_mail_client %{buildroot}/usr/bin/icd360s-mail

          %files
          /usr/lib/icd360s-mail/
          /usr/bin/icd360s-mail
          SPEC

          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/icd360s-mail.spec
          cp rpmbuild/RPMS/x86_64/*.rpm "ICD360S_MailClient_v${VER}_linux_x86_64.rpm" 2>/dev/null || \
          cp rpmbuild/RPMS/noarch/*.rpm "ICD360S_MailClient_v${VER}_linux.rpm" 2>/dev/null || \
          echo "RPM build skipped - may need additional deps"

      - name: Build AppImage
        run: |
          # Download appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          # Create AppDir structure
          APP_DIR="ICD360S_Mail.AppDir"
          mkdir -p "$APP_DIR/usr/bin"
          mkdir -p "$APP_DIR/usr/lib"
          mkdir -p "$APP_DIR/usr/share/icons/hicolor/256x256/apps"

          # Copy built app
          cp -r build/linux/x64/release/bundle/* "$APP_DIR/usr/bin/"

          # Desktop file at root
          cat > "$APP_DIR/icd360s-mail.desktop" << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=ICD360S Mail Client
          Comment=Modern email client with mTLS security
          Exec=icd360s_mail_client
          Icon=icd360s-mail
          Terminal=false
          Categories=Network;Email;
          DESKTOP
          sed -i 's/^          //' "$APP_DIR/icd360s-mail.desktop"

          # Icon
          if [ -f assets/logo.png ]; then
            cp assets/logo.png "$APP_DIR/icd360s-mail.png"
            cp assets/logo.png "$APP_DIR/usr/share/icons/hicolor/256x256/apps/icd360s-mail.png"
          fi

          # AppRun
          cat > "$APP_DIR/AppRun" << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/icd360s_mail_client" "$@"
          APPRUN
          chmod +x "$APP_DIR/AppRun"

          # Build AppImage
          ARCH=x86_64 ./appimagetool "$APP_DIR" "ICD360S_MailClient_v${VER}_linux_x86_64.AppImage" || \
          echo "AppImage build skipped"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            ICD360S_MailClient_v*_linux*.tar.gz
            ICD360S_MailClient_v*_linux*.deb
            ICD360S_MailClient_v*_linux*.rpm
            ICD360S_MailClient_v*_linux*.AppImage
          retention-days: 30

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  WINDOWS
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-windows:
    name: Windows (zip + Inno Setup installer)
    needs: version
    runs-on: windows-latest
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.platforms, 'windows') ||
      contains(github.event.inputs.platforms, 'all')
    env:
      VER: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install enough_mail_fork dependencies
        run: flutter pub get
        working-directory: enough_mail_fork

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package ZIP (portable)
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "ICD360S_MailClient_v${{ env.VER }}_windows_x64_portable.zip"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build Inno Setup installer
        shell: cmd
        run: |
          iscc "windows\installer.iss"

      - name: Copy installer
        shell: pwsh
        run: |
          $installer = "build\installer\ICD360S_MailClient_Setup_v${{ env.VER }}.exe"
          if (Test-Path $installer) {
            Copy-Item $installer "ICD360S_MailClient_v${{ env.VER }}_windows_x64_setup.exe"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            ICD360S_MailClient_v*_windows*.zip
            ICD360S_MailClient_v*_windows*.exe
          retention-days: 30

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  macOS
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-macos:
    name: macOS (DMG)
    needs: version
    runs-on: macos-latest
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.platforms, 'macos') ||
      contains(github.event.inputs.platforms, 'all')
    env:
      VER: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install enough_mail_fork dependencies
        run: flutter pub get
        working-directory: enough_mail_fork

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Create DMG
        run: |
          APP="build/macos/Build/Products/Release/icd360s_mail_client.app"

          # DMG with app + Applications symlink (drag to install)
          DMG_DIR="$RUNNER_TEMP/dmg_contents"
          mkdir -p "$DMG_DIR"
          cp -r "$APP" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"

          hdiutil create -volname "ICD360S Mail Client" \
            -srcfolder "$DMG_DIR" -ov -format UDZO \
            "ICD360S_MailClient_v${VER}_macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: ICD360S_MailClient_v*_macos.dmg
          retention-days: 30

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  iOS
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-ios:
    name: iOS (IPA unsigned)
    needs: version
    runs-on: macos-latest
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.platforms, 'ios') ||
      contains(github.event.inputs.platforms, 'all')
    env:
      VER: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install enough_mail_fork dependencies
        run: flutter pub get
        working-directory: enough_mail_fork

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update || pod install

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Export IPA
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r -q "ICD360S_MailClient_v${VER}_ios.ipa" Payload
            rm -rf Payload
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ICD360S_MailClient_v*_ios.ipa
          retention-days: 30
          if-no-files-found: warn

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  ANDROID (all store flavors)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-android:
    name: Android (All Store Flavors)
    needs: version
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.platforms, 'android') ||
      contains(github.event.inputs.platforms, 'all')
    env:
      VER: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install enough_mail_fork dependencies
        run: flutter pub get
        working-directory: enough_mail_fork

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
            echo "$KEY_PROPERTIES" > android/key.properties
            echo "Android signing configured"
          else
            echo "No signing secrets - builds will use debug signing"
          fi

      # ── Universal APK (sideload / mail.icd360s.de) ──
      - name: Build Universal APK
        run: flutter build apk --release --flavor universal

      # ── F-Droid APK ──
      - name: Build F-Droid APK
        run: flutter build apk --release --flavor fdroid

      # ── Google Play AAB ──
      - name: Build Google Play AAB
        run: flutter build appbundle --release --flavor googleplay

      # ── Huawei AppGallery APK ──
      - name: Build Huawei APK
        run: flutter build apk --release --flavor huawei

      # ── Samsung Galaxy Store APK ──
      - name: Build Samsung APK
        run: flutter build apk --release --flavor samsung

      - name: Collect Android artifacts
        run: |
          mkdir -p dist

          # Universal APK
          cp build/app/outputs/flutter-apk/app-universal-release.apk \
            "dist/ICD360S_MailClient_v${VER}_android_universal.apk"

          # F-Droid APK
          cp build/app/outputs/flutter-apk/app-fdroid-release.apk \
            "dist/ICD360S_MailClient_v${VER}_android_fdroid.apk"

          # Google Play AAB
          cp build/app/outputs/bundle/googleplayRelease/app-googleplay-release.aab \
            "dist/ICD360S_MailClient_v${VER}_android_googleplay.aab"

          # Huawei APK
          cp build/app/outputs/flutter-apk/app-huawei-release.apk \
            "dist/ICD360S_MailClient_v${VER}_android_huawei.apk"

          # Samsung APK
          cp build/app/outputs/flutter-apk/app-samsung-release.apk \
            "dist/ICD360S_MailClient_v${VER}_android_samsung.apk"

          echo "Android artifacts:"
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: dist/*
          retention-days: 30

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  RELEASE (on tags only)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  release:
    name: Create GitHub Release
    needs: [version, build-linux, build-windows, build-macos, build-ios, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VER: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          find . -type f \( \
            -name '*.apk' -o -name '*.aab' -o -name '*.ipa' \
            -o -name '*.dmg' -o -name '*.zip' -o -name '*.exe' \
            -o -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \
            -o -name '*.AppImage' \
          \) -exec sha256sum {} + | sort > SHA256SUMS.txt
          echo "=== SHA-256 Checksums ==="
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.VER }}"
          generate_release_notes: true
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/SHA256SUMS.txt
