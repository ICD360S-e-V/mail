name: gitleaks

on:
  push:
    branches: ['**']
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  scan:
    name: gitleaks scan
    # Dependabot PRs run under a separate token and do not get access
    # to repo Actions secrets, so GITLEAKS_LICENSE is empty and the
    # gitleaks-action errors out with "missing gitleaks license".
    # Dependabot only bumps dependency versions — no risk of new
    # secrets being introduced — so skip the scan for these PRs.
    # Regular PRs, pushes, and the weekly cron still run normally.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
