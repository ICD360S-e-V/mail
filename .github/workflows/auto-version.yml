name: Auto Version Bump

on:
  push:
    branches: [main]
    # Tag pushes do NOT trigger this workflow — only branch pushes.
    # The bump commit uses [skip ci] to prevent re-triggering.

# Prevent concurrent version bumps
concurrency:
  group: auto-version
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    name: Determine & Apply Version Bump
    runs-on: ubuntu-latest
    # Skip bump commits from release-bot (prevents infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore(version):')"

    steps:
      - name: Checkout (full history required for cocogitto)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          # PAT required: GITHUB_TOKEN pushes do NOT trigger other workflows.
          # The tag push must trigger build-all-platforms.yml.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup Git identity
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"

      - name: Install cocogitto
        run: |
          COG_VERSION="7.0.0"
          COG_SHA256="e03938ff2c4c86d71c00c0f3284dbbe95c5ca76fe34a51f33e945c23010d59bb"
          echo "Installing cocogitto $COG_VERSION"
          curl -sSL "https://github.com/cocogitto/cocogitto/releases/download/${COG_VERSION}/cocogitto-${COG_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/cog.tar.gz
          echo "${COG_SHA256}  /tmp/cog.tar.gz" | sha256sum -c -
          tar xz --strip-components=1 -C /usr/local/bin < /tmp/cog.tar.gz
          rm -f /tmp/cog.tar.gz
          cog --version

      - name: Run auto-bump
        id: cog_bump
        run: |
          # Check what commits exist since last tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "Latest tag: $LATEST_TAG"
          if [ "$LATEST_TAG" != "none" ]; then
            echo "Commits since $LATEST_TAG:"
            git log "$LATEST_TAG"..HEAD --oneline
          fi

          # Attempt bump
          OUTPUT=$(cog bump --auto 2>&1) || true
          echo "$OUTPUT"

          # Extract version from cog output or from new tag
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$NEW_TAG" != "$LATEST_TAG" ] && [ "$NEW_TAG" != "none" ]; then
            VERSION="${NEW_TAG#v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "New version: $NEW_TAG"
          else
            echo "No bump needed."
          fi

      - name: Convert to annotated tag and push
        if: steps.cog_bump.outputs.version != ''
        run: |
          VERSION="${{ steps.cog_bump.outputs.version }}"
          TAG="v${VERSION}"
          PREV_TAG=$(git tag -l 'v*' --sort=-version:refname | grep -v "$TAG" | head -1)

          # Build a descriptive tag message from all commits since last tag.
          # Groups by type: Bug Fixes, Features, Refactoring, etc.
          TAG_MSG="${TAG}"$'\n\n'

          # Collect fix: commits
          FIXES=$(git log "${PREV_TAG}..${TAG}~1" --oneline --grep="^fix" --format="  - %s" 2>/dev/null || true)
          if [ -n "$FIXES" ]; then
            TAG_MSG+="Bug Fixes:"$'\n'"${FIXES}"$'\n\n'
          fi

          # Collect feat: commits
          FEATS=$(git log "${PREV_TAG}..${TAG}~1" --oneline --grep="^feat" --format="  - %s" 2>/dev/null || true)
          if [ -n "$FEATS" ]; then
            TAG_MSG+="New Features:"$'\n'"${FEATS}"$'\n\n'
          fi

          # Collect refactor: commits
          REFACTORS=$(git log "${PREV_TAG}..${TAG}~1" --oneline --grep="^refactor" --format="  - %s" 2>/dev/null || true)
          if [ -n "$REFACTORS" ]; then
            TAG_MSG+="Refactoring:"$'\n'"${REFACTORS}"$'\n\n'
          fi

          # Collect perf: commits
          PERFS=$(git log "${PREV_TAG}..${TAG}~1" --oneline --grep="^perf" --format="  - %s" 2>/dev/null || true)
          if [ -n "$PERFS" ]; then
            TAG_MSG+="Performance:"$'\n'"${PERFS}"$'\n\n'
          fi

          # Collect security: commits
          SECS=$(git log "${PREV_TAG}..${TAG}~1" --oneline --grep="^security" --format="  - %s" 2>/dev/null || true)
          if [ -n "$SECS" ]; then
            TAG_MSG+="Security:"$'\n'"${SECS}"$'\n\n'
          fi

          echo "Tag message:"
          echo "$TAG_MSG"

          # Sync hardcoded currentVersion in update_service.dart
          sed -i "s/static const String currentVersion = '.*'/static const String currentVersion = '${VERSION}'/" lib/services/update_service.dart
          if git diff --quiet lib/services/update_service.dart; then
            echo "update_service.dart already up to date"
          else
            git add lib/services/update_service.dart
            git commit --amend --no-edit
            echo "✓ update_service.dart synced to ${VERSION}"
          fi

          # cog creates lightweight tags; build workflow requires annotated.
          git tag -d "$TAG"
          git tag -a "$TAG" -m "$TAG_MSG"

          git push origin main
          git push origin "$TAG"
