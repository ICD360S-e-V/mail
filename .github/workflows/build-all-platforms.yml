name: Build All Platforms

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'lib/**'
      - 'android/**'
      - 'ios/**'
      - 'macos/**'
      - 'linux/**'
      - 'windows/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'enough_mail_fork/**'
      - '.github/workflows/build-all-platforms.yml'
  workflow_dispatch:

# Concurrency: PR / branch pushes share a group and cancel the previous
# run on new commits (saves CI minutes). Tag pushes (v*) get an isolated
# group per tag AND opt out of cancellation so a release build is never
# killed by a concurrent dependabot PR — that's how v2.136.11 and v2.137.0
# were lost previously (PR sync triggered cancel-in-progress on the tag run).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

# SECURITY: Default least-privilege permissions for all jobs.
# Individual jobs override as needed (e.g., 'release' needs contents: write).
permissions:
  contents: read

env:
  # Bumped 3.41.4 → 3.41.9 to fix Windows startup hang (v2.138.2..v2.138.5
  # series). Reproduced empirically: same source code builds a non-hanging
  # Windows .exe on Flutter 3.41.9 and a hanging one on 3.41.4. The
  # difference is in flutter_windows.dll (engine) — likely a platform
  # channel race in early init that 3.41.9 fixed. See PRs #52, #54, #55
  # for false-lead theories before the version mismatch was identified.
  FLUTTER_VERSION: "3.41.9"
  JAVA_VERSION: "17"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # Detect Changes - Smart cache detection to skip unchanged platforms
  # ============================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      linux_changed: ${{ steps.check.outputs.linux_changed }}
      android_changed: ${{ steps.check.outputs.android_changed }}
      apple_changed: ${{ steps.check.outputs.apple_changed }}
      windows_changed: ${{ steps.check.outputs.windows_changed }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Compute platform hashes
        id: hashes
        run: |
          # Hash shared code (lib/, pubspec.*, assets/, enough_mail_fork/)
          SHARED_HASH=$(find lib/ pubspec.yaml pubspec.lock assets/ enough_mail_fork/ -type f -print0 2>/dev/null | sort -z | xargs -0 cat 2>/dev/null | sha256sum | cut -d' ' -f1)
          echo "shared_hash=$SHARED_HASH" >> "$GITHUB_OUTPUT"

          # Hash platform-specific dirs
          LINUX_HASH=$(find linux/ -type f -print0 | sort -z | xargs -0 cat | sha256sum | cut -d' ' -f1)
          ANDROID_HASH=$(find android/ -type f -print0 | sort -z | xargs -0 cat | sha256sum | cut -d' ' -f1)
          APPLE_HASH=$(find ios/ macos/ -type f -print0 | sort -z | xargs -0 cat | sha256sum | cut -d' ' -f1)
          WINDOWS_HASH=$(find windows/ -type f -print0 | sort -z | xargs -0 cat | sha256sum | cut -d' ' -f1)

          echo "linux_hash=${SHARED_HASH:0:16}${LINUX_HASH:0:16}" >> "$GITHUB_OUTPUT"
          echo "android_hash=${SHARED_HASH:0:16}${ANDROID_HASH:0:16}" >> "$GITHUB_OUTPUT"
          echo "apple_hash=${SHARED_HASH:0:16}${APPLE_HASH:0:16}" >> "$GITHUB_OUTPUT"
          echo "windows_hash=${SHARED_HASH:0:16}${WINDOWS_HASH:0:16}" >> "$GITHUB_OUTPUT"

      - name: Check Linux cache
        id: cache-linux
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .cache-marker-linux
          key: build-success-linux-${{ steps.hashes.outputs.linux_hash }}
          lookup-only: true

      - name: Check Android cache
        id: cache-android
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .cache-marker-android
          key: build-success-android-${{ steps.hashes.outputs.android_hash }}
          lookup-only: true

      - name: Check Apple cache
        id: cache-apple
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .cache-marker-apple
          key: build-success-apple-${{ steps.hashes.outputs.apple_hash }}
          lookup-only: true

      - name: Check Windows cache
        id: cache-windows
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .cache-marker-windows
          key: build-success-windows-${{ steps.hashes.outputs.windows_hash }}
          lookup-only: true

      - name: Determine what changed
        id: check
        env:
          CACHE_LINUX: ${{ steps.cache-linux.outputs.cache-hit }}
          CACHE_ANDROID: ${{ steps.cache-android.outputs.cache-hit }}
          CACHE_APPLE: ${{ steps.cache-apple.outputs.cache-hit }}
          CACHE_WINDOWS: ${{ steps.cache-windows.outputs.cache-hit }}
        run: |
          # If cache hit, platform hasn't changed since last successful build
          if [ "$CACHE_LINUX" = "true" ]; then
            echo "linux_changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Linux: skipping (no changes since last successful build)"
          else
            echo "linux_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Linux: will build"
          fi

          if [ "$CACHE_ANDROID" = "true" ]; then
            echo "android_changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Android: skipping (no changes since last successful build)"
          else
            echo "android_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Android: will build"
          fi

          if [ "$CACHE_APPLE" = "true" ]; then
            echo "apple_changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Apple: skipping (no changes since last successful build)"
          else
            echo "apple_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Apple: will build"
          fi

          if [ "$CACHE_WINDOWS" = "true" ]; then
            echo "windows_changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Windows: skipping (no changes since last successful build)"
          else
            echo "windows_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Windows: will build"
          fi

  # ============================================================
  # Static Analysis - catch type errors and lint warnings early
  # ============================================================
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Resolve dependencies
        run: flutter pub get --enforce-lockfile

      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos

  # ============================================================
  # Linux Build - .deb, .rpm, AppImage
  # ============================================================
  build-linux:
    name: Linux
    needs: [detect-changes, analyze]
    if: needs.detect-changes.outputs.linux_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          # Build-time deps:
          #   libcurl4-openssl-dev    sentry-native links libcurl at compile
          #                           ("Could NOT find CURL ..." without it)
          #   libayatana-appindicator3-dev  required when the Flatpak bundles
          #                           libayatana-appindicator (KDE/GNOME tray);
          #                           keeps headers in path so the bundle's
          #                           glue compiles cleanly
          #   libjsoncpp-dev          some Flutter desktop plugins pull it in
          #                           transitively; explicit avoids "fatal
          #                           error: json/json.h" on plugin updates
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libsecret-1-0 \
            libcurl4-openssl-dev \
            libayatana-appindicator3-dev \
            libjsoncpp-dev \
            rpm ruby-dev
          sudo gem install fpm

      - name: Cache native build hooks (sodium)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .dart_tool/hooks_runner/
          key: native-hooks-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            native-hooks-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve Flutter dependencies
        run: flutter pub get --enforce-lockfile

      - name: Compile Linux release binary
        run: |
          flutter build linux --release \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=SENTRY_RELEASE=mail-client-app@${{ github.ref_name }}+${{ github.run_number }}

      # SECURITY (M9): Declare libsecret-1-0 as a runtime dependency.
      # flutter_secure_storage_linux requires libsecret to use the system
      # keyring (gnome-keyring/KWallet via Secret Service API). Without it,
      # the app silently degrades to the file-based fallback storage —
      # which is now AES-GCM (M4) but still weaker than a system keyring
      # tied to the user's login session.
      - name: Build .deb package
        run: |
          fpm -s dir -t deb \
            -n icd360s-mail-client \
            -v $(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //;s/+.*//' ) \
            --description "ICD360S Mail Client - Modern email client with threat detection" \
            --maintainer "ICD360S e.V." \
            --url "https://github.com/ICD360S-e-V/mail" \
            --license "AGPL-3.0-or-later" \
            --depends libgtk-3-0 \
            --depends libsecret-1-0 \
            --category mail \
            --deb-no-default-config-files \
            build/linux/x64/release/bundle/=/opt/icd360s-mail-client/ \
            linux/icd360s-mail-client.desktop=/usr/share/applications/icd360s-mail-client.desktop

      - name: Build .rpm package
        run: |
          fpm -s dir -t rpm \
            -n icd360s-mail-client \
            -v $(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //;s/+.*//' ) \
            --description "ICD360S Mail Client - Modern email client with threat detection" \
            --maintainer "ICD360S e.V." \
            --url "https://github.com/ICD360S-e-V/mail" \
            --license "AGPL-3.0-or-later" \
            --depends gtk3 \
            --depends libsecret \
            --category "Applications/Internet" \
            build/linux/x64/release/bundle/=/opt/icd360s-mail-client/ \
            linux/icd360s-mail-client.desktop=/usr/share/applications/icd360s-mail-client.desktop

      # SECURITY (M10): Import the GPG signing key into a temporary keyring
      # so appimagetool can sign the AppImage. The private key is stored in
      # GitHub Secrets and never written to disk in the workflow source.
      # The temporary keyring is wiped in the cleanup step regardless of
      # success/failure.
      - name: Import AppImage GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APPIMAGE_GPG_PRIVATE_KEY }}
        run: |
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG
          # Persist GNUPGHOME for the next steps
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

      # ─────────────────────────────────────────────────────────────
      # Download + verify appimagetool (pinned to 1.9.1, SHA-256 checked)
      #
      # Upstream:  https://github.com/AppImage/appimagetool/releases/tag/1.9.1
      # Commit:    8c8c91f762b412a19f4e8d2c4b35afb98f2d7c81
      # Published: 2025-11-18
      # Verified:  2026-04-10 against GitHub Releases API .assets[].digest
      #
      # WHY pinned to 1.9.1 and not "continuous":
      #   The "continuous" tag is a rolling pointer, rebuilt on every
      #   upstream commit. Identical URL → DIFFERENT bytes over time.
      #   Even with SHA-256 verification, "continuous" would silently
      #   break CI on the next upstream push.
      #
      # ROTATION (every ~6 months):
      #   gh api repos/AppImage/appimagetool/releases/latest \
      #     --jq '{tag:.tag_name, published:.published_at,
      #            assets:[.assets[]|{name,digest,size}]}'
      #   Update APPIMAGETOOL_VERSION + APPIMAGETOOL_SHA256 + cache key
      #   in the same commit.
      # ─────────────────────────────────────────────────────────────
      - name: Cache appimagetool
        id: cache-appimagetool
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.4 (Node 24)
        with:
          path: appimagetool
          key: appimagetool-x86_64-1.9.1-ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0

      - name: Download and verify appimagetool
        env:
          APPIMAGETOOL_VERSION: "1.9.1"
          APPIMAGETOOL_URL: "https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage"
          APPIMAGETOOL_SHA256: "ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0"
        run: |
          set -euo pipefail

          if [ -f appimagetool ]; then
            echo "::notice::appimagetool restored from cache, re-verifying hash"
          else
            echo "::notice::Downloading appimagetool ${APPIMAGETOOL_VERSION}"
            curl --fail --location --silent --show-error \
                 --retry 5 --retry-delay 2 --retry-connrefused \
                 --output appimagetool.tmp \
                 "${APPIMAGETOOL_URL}"
            mv appimagetool.tmp appimagetool
          fi

          # Verify SHA-256. --strict catches whitespace/format issues.
          # Hash mismatch = exit 1 = workflow fails loudly.
          echo "${APPIMAGETOOL_SHA256}  appimagetool" | sha256sum --check --strict
          chmod +x appimagetool

          # Sanity: print version so the build log shows what actually ran
          ./appimagetool --version || true

      - name: Prepare AppDir structure
        run: |
          mkdir -p AppDir/usr/bin \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps

      - name: Stage Flutter bundle into AppDir
        run: |
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

      - name: Stage desktop entry and icons
        run: |
          cp linux/icd360s-mail-client.desktop AppDir/icd360s-mail-client.desktop
          cp linux/icd360s-mail-client.desktop AppDir/usr/share/applications/
          cp assets/logo.png AppDir/icd360s_mail_client.png
          cp assets/logo.png AppDir/usr/share/icons/hicolor/256x256/apps/icd360s_mail_client.png

      - name: Build and GPG-sign AppImage
        env:
          GPG_KEY_ID: ${{ secrets.APPIMAGE_GPG_KEY_ID }}
        run: |
          # --sign           — embed signature in AppImage Signing Block
          # --sign-key KEYID — use the imported key
          ARCH=x86_64 ./appimagetool --no-appstream \
            --sign --sign-key "$GPG_KEY_ID" \
            AppDir ICD360S-Mail-Client-x86_64.AppImage

      - name: Cleanup GPG keyring
        if: always()
        run: |
          if [ -n "$GNUPGHOME" ] && [ -d "$GNUPGHOME" ]; then
            shred -uvz "$GNUPGHOME"/*/* 2>/dev/null || true
            rm -rf "$GNUPGHOME"
          fi

      # Raw bundle tarball for toolbox / portable / dev install — no
      # packaging metadata, just the binary tree (`./icd360s_mail_client`
      # + .so deps + data/). User extracts and runs from a Fedora
      # Silverblue/Kinoite toolbox container with libgtk + libsecret
      # available in the toolbox image.
      - name: Build raw .tar.gz bundle
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          TAR_NAME="ICD360S-Mail-Client-${VERSION}-linux-x64.tar.gz"
          tar -C build/linux/x64/release -czf "$TAR_NAME" bundle/
          echo "Tarball: $TAR_NAME ($(du -h "$TAR_NAME" | cut -f1))"
          ls -la "$TAR_NAME"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux-build
          path: |
            build/linux/x64/release/bundle/
            *.deb
            *.rpm
            *.AppImage
            *-linux-x64.tar.gz
          retention-days: 30

      # Separate artifact with ONLY the raw bundle directory, named
      # `linux-bundle`, consumed by the `build-flatpak` job downstream.
      # Keeping it separate avoids the Flatpak job having to download
      # the full .deb/.rpm/.AppImage zoo (saves ~80MB per run).
      - name: Upload Linux bundle (for Flatpak job)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle/
          retention-days: 7
          if-no-files-found: error

      - name: Linux build summary
        if: always()
        run: |
          {
            echo "## 🐧 Linux Build Summary"
            echo ""
            echo "| Artifact | Size | Status |"
            echo "|----------|-----:|:------:|"
            for f in *.deb *.rpm *.AppImage; do
              if [ -f "$f" ]; then
                SIZE=$(du -h "$f" | cut -f1)
                echo "| \`$f\` | $SIZE | ✅ |"
              fi
            done
            echo ""
            if [ -d "build/linux/x64/release/bundle" ]; then
              BUNDLE_SIZE=$(du -sh build/linux/x64/release/bundle | cut -f1)
              echo "**Flutter bundle**: $BUNDLE_SIZE"
              echo ""
            fi
            echo "### Build steps completed"
            echo "- ✅ Flutter SDK installed"
            echo "- ✅ Linux dependencies installed"
            echo "- ✅ Flutter build (release)"
            echo "- ✅ .deb package built"
            echo "- ✅ .rpm package built"
            echo "- ✅ AppImage built (signed with GPG)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compute Linux hash
        if: success()
        id: hashes
        run: |
          SHARED_HASH=$(find lib/ pubspec.yaml pubspec.lock assets/ enough_mail_fork/ -type f -print0 2>/dev/null | sort -z | xargs -0 cat 2>/dev/null | sha256sum | cut -d' ' -f1)
          LINUX_HASH=$(find linux/ -type f -print0 | sort -z | xargs -0 cat | sha256sum | cut -d' ' -f1)
          echo "linux_hash=${SHARED_HASH:0:16}${LINUX_HASH:0:16}" >> "$GITHUB_OUTPUT"

      - name: Save cache marker
        if: success()
        run: |
          mkdir -p .cache-marker-linux
          echo "$GITHUB_SHA" > .cache-marker-linux/sha

      - name: Save Linux build cache
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .cache-marker-linux
          key: build-success-linux-${{ steps.hashes.outputs.linux_hash }}

  # ============================================================
  # Flatpak Build (Fedora Silverblue / Kinoite primary target)
  # Consumes `linux-bundle` artifact from build-linux. Uses Flathub's
  # shared-modules for libayatana-appindicator (don't invent SHA-256s
  # for libs that already have upstream-maintained module definitions).
  # ============================================================
  build-flatpak:
    name: Flatpak
    needs: [detect-changes, build-linux]
    if: needs.detect-changes.outputs.linux_changed == 'true'
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download Linux bundle
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: linux-bundle
          path: flatpak/bundle

      - name: Restore executable bit on bundle binary
        run: |
          # GitHub artifacts preserve content but strip POSIX exec bit;
          # the manifest's chmod +x runs at build time but flatpak-builder
          # also wants the source file to be readable as-is.
          chmod +x flatpak/bundle/icd360s_mail_client
          ls -la flatpak/bundle/icd360s_mail_client

      - name: Clone Flathub shared-modules
        run: |
          git clone --depth 1 --branch master \
            https://github.com/flathub/shared-modules.git \
            flatpak/shared-modules
          # Sanity: the file we reference in the manifest must exist
          test -f flatpak/shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

      - name: Compute version for bundle filename
        id: ver
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6.7
        with:
          bundle: ICD360S-Mail-Client-${{ steps.ver.outputs.version }}.flatpak
          manifest-path: flatpak/de.icd360s.mailclient.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: flatpak-build
          path: ICD360S-Mail-Client-*.flatpak
          retention-days: 30

      # ──────────────────────────────────────────────────────────────────
      # Flatpak REPO export — produces an OSTree-formatted repository
      # tree alongside the single-file bundle. Hosting the repo (rather
      # than handing users a .flatpak) is what unlocks:
      #   • GNOME Software / Discover "Updates" page picks up new versions
      #   • `flatpak remote-add icd360s …` + `flatpak update icd360s` flow
      #   • No more "Update Issue" warning that bundle-only installs cause
      #     when GNOME Software has no origin remote to refresh against
      # The flatpak-builder action already builds INTO ./repo when it
      # produces the bundle; we just refresh the summary file and tar it
      # up so the deploy job can rsync it to the server.
      - name: Refresh Flatpak repo summary
        run: |
          # Sanity-check the repo dir the action populated. Skip silently
          # if cache restore short-circuited the build — we never want to
          # block a release on this optional artifact.
          if [ ! -d repo ]; then
            echo "::warning::./repo not present (likely a cache hit). Skipping repo export."
            exit 0
          fi
          flatpak build-update-repo --generate-static-deltas repo
          # Print branch list for debugging — should show
          # `app/de.icd360s.mailclient/x86_64/stable` (or similar).
          ostree --repo=repo refs

      - name: Tar Flatpak repo for transit
        if: hashFiles('repo/summary') != ''
        run: |
          tar -cf flatpak-repo.tar -C repo .
          ls -lh flatpak-repo.tar

      - name: Stage Flatpak repo discovery file alongside artifact
        # The .flatpakrepo discovery file lives in the source tree
        # (flatpak/), but the deploy job has no `actions/checkout` —
        # it only consumes artifacts. Copy it next to the tar so the
        # artifact contains both. Without this, the file is missing
        # on the server and nginx falls back to its default landing
        # page when a user fetches `<repo>/icd360s.flatpakrepo`,
        # which is what broke `flatpak remote-add` for v2.140.0.
        if: hashFiles('flatpak/icd360s.flatpakrepo') != ''
        run: |
          cp flatpak/icd360s.flatpakrepo ./icd360s.flatpakrepo
          ls -lh icd360s.flatpakrepo

      - name: Upload Flatpak repo
        if: hashFiles('flatpak-repo.tar') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: flatpak-repo
          path: |
            flatpak-repo.tar
            icd360s.flatpakrepo
          retention-days: 30

      - name: Flatpak build summary
        if: always()
        run: |
          {
            echo "## 📦 Flatpak Build Summary"
            echo ""
            for f in ICD360S-Mail-Client-*.flatpak; do
              if [ -f "$f" ]; then
                SIZE=$(du -h "$f" | cut -f1)
                echo "| Artifact | Size |"
                echo "|---|---:|"
                echo "| \`$f\` | $SIZE |"
              fi
            done
            echo ""
            echo "Manifest: \`flatpak/de.icd360s.mailclient.yml\`"
            echo "Runtime: \`org.freedesktop.Platform//24.08\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # Android Build - Per-flavor APKs + AAB, each on dedicated runner
  # ============================================================
  build-android:
    name: Android (${{ matrix.flavor }}${{ matrix.format == 'aab' && ' AAB' || '' }})
    needs: [detect-changes, analyze]
    if: needs.detect-changes.outputs.android_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # APKs per flavor (split-per-abi, obfuscated)
          - flavor: universal
            format: apk
            build_args: "--split-per-abi --obfuscate --split-debug-info=build/symbols"
          - flavor: fdroid
            format: apk
            build_args: "--split-per-abi --obfuscate --split-debug-info=build/symbols"
          - flavor: googleplay
            format: apk
            build_args: "--split-per-abi --obfuscate --split-debug-info=build/symbols"
          - flavor: samsung
            format: apk
            build_args: "--split-per-abi --obfuscate --split-debug-info=build/symbols"
          - flavor: huawei
            format: apk
            build_args: "--split-per-abi --obfuscate --split-debug-info=build/symbols"
          # AAB doar pentru Google Play
          - flavor: googleplay
            format: aab
            build_args: "--obfuscate --split-debug-info=build/symbols"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # SECURITY (M7): Pass secrets via env vars so they are never interpolated
      # directly into the shell script body. A secret containing special chars,
      # a newline, or the heredoc marker itself cannot break out of the
      # command/heredoc this way — bash reads the value from the environment
      # as a literal string.
      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_B64" | base64 -d > android/upload-keystore.jks

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          # Use printf instead of a heredoc so there is no risk of a marker
          # collision. Env vars are expanded by bash (not by the Actions
          # template engine), so they are treated as literal strings.
          {
            printf 'storePassword=%s\n' "$STORE_PASSWORD"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'storeFile=../upload-keystore.jks\n'
          } > android/key.properties
          chmod 600 android/key.properties

      - name: Restore native build hooks (sodium)
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .dart_tool/hooks_runner/
          key: native-hooks-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            native-hooks-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve Flutter dependencies
        run: flutter pub get --enforce-lockfile

      - name: Compile Android ${{ matrix.flavor }} ${{ matrix.format }} (release)
        env:
          BUILD_FORMAT: ${{ matrix.format }}
          BUILD_FLAVOR: ${{ matrix.flavor }}
          BUILD_ARGS: ${{ matrix.build_args }}
        run: |
          flutter build "$BUILD_FORMAT" --release \
            --flavor "$BUILD_FLAVOR" $BUILD_ARGS \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=SENTRY_RELEASE=mail-client-app@${{ github.ref_name }}+${{ github.run_number }}

      - name: Upload Android ${{ matrix.flavor }} ${{ matrix.format }} artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-${{ matrix.flavor }}-${{ matrix.format }}
          path: |
            build/app/outputs/flutter-apk/*${{ matrix.flavor }}*.apk
            build/app/outputs/bundle/${{ matrix.flavor }}Release/*.aab
            build/symbols/
          retention-days: 30

      - name: Android ${{ matrix.flavor }} ${{ matrix.format }} build summary
        if: always()
        env:
          BUILD_FORMAT: ${{ matrix.format }}
          BUILD_FLAVOR: ${{ matrix.flavor }}
        run: |
          {
            echo "## 🤖 Android Build Summary — $BUILD_FLAVOR ($BUILD_FORMAT)"
            echo ""
            echo "| Artifact | Size | Status |"
            echo "|----------|-----:|:------:|"
            for f in build/app/outputs/flutter-apk/*${BUILD_FLAVOR}*.apk \
                     build/app/outputs/bundle/${BUILD_FLAVOR}Release/*.aab; do
              if [ -f "$f" ]; then
                NAME=$(basename "$f")
                SIZE=$(du -h "$f" | cut -f1)
                echo "| \`$NAME\` | $SIZE | ✅ |"
              fi
            done
            echo ""
            echo "### Build steps completed"
            echo "- ✅ Java 17 + Flutter SDK installed"
            echo "- ✅ Keystore decoded from CI secrets"
            echo "- ✅ Flutter build $BUILD_FORMAT --flavor $BUILD_FLAVOR (release)"
            echo "- ✅ Uploaded as android-$BUILD_FLAVOR-$BUILD_FORMAT artifact"
          } >> "$GITHUB_STEP_SUMMARY"

  # Save Android cache marker (runs after all matrix jobs)
  android-cache-save:
    name: Android Cache Save
    needs: [detect-changes, build-android]
    if: needs.detect-changes.outputs.android_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: |
            lib
            pubspec.yaml
            pubspec.lock
            assets
            android

      - name: Compute Android hash
        id: hashes
        run: |
          SHARED_HASH=$(find lib/ pubspec.yaml pubspec.lock assets/ enough_mail_fork/ -type f -print0 2>/dev/null | sort -z | xargs -0 cat 2>/dev/null | sha256sum | cut -d' ' -f1)
          ANDROID_HASH=$(find android/ -type f -print0 | sort -z | xargs -0 cat | sha256sum | cut -d' ' -f1)
          echo "android_hash=${SHARED_HASH:0:16}${ANDROID_HASH:0:16}" >> "$GITHUB_OUTPUT"

      - name: Save cache marker
        run: |
          mkdir -p .cache-marker-android
          echo "$GITHUB_SHA" > .cache-marker-android/sha

      - name: Save Android build cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .cache-marker-android
          key: build-success-android-${{ steps.hashes.outputs.android_hash }}

  # ============================================================
  # iOS Build
  # ============================================================
  build-ios:
    name: iOS
    needs: [detect-changes, analyze]
    if: needs.detect-changes.outputs.apple_changed == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Cache Flutter SDK
        id: cache-flutter-ios
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/flutter
          key: flutter-${{ runner.os }}-${{ runner.arch }}-${{ env.FLUTTER_VERSION }}

      - name: Install Flutter (manual)
        if: steps.cache-flutter-ios.outputs.cache-hit != 'true'
        env:
          FL_VER: ${{ env.FLUTTER_VERSION }}
        run: |
          FLUTTER_ZIP="flutter_macos_${FL_VER}-stable.zip"
          FLUTTER_URL="https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/${FLUTTER_ZIP}"
          # Flutter 3.41.9 macOS x64 zip SHA-256. Update in lockstep with
          # FLUTTER_VERSION above; otherwise iOS+macOS jobs fail at
          # integrity check (broke v2.138.6).
          # Fetch latest: curl .../releases_macos.json | jq for the SHA.
          EXPECTED_SHA="eaee3b6aa6da114eb0be843ac53f4f138d3d8827779ff1e4546b345c75b9cba1"
          curl -fsSL -o "$FLUTTER_ZIP" "$FLUTTER_URL"
          ACTUAL_SHA=$(shasum -a 256 "$FLUTTER_ZIP" | cut -d' ' -f1)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Flutter SDK integrity check FAILED!"
            echo "Expected: $EXPECTED_SHA"
            echo "Actual:   $ACTUAL_SHA"
            exit 1
          fi
          echo "✓ Flutter SDK SHA-256 verified"
          unzip -q "$FLUTTER_ZIP" -d "$HOME"
          rm "$FLUTTER_ZIP"

      - name: Add Flutter to PATH
        run: echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter precache
        if: steps.cache-flutter-ios.outputs.cache-hit != 'true'
        run: flutter precache --ios

      - name: Cache pub dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-ios-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-ios-

      - name: Cache native build hooks (sodium)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .dart_tool/hooks_runner/
          key: native-hooks-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            native-hooks-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve Flutter dependencies
        run: flutter pub get --enforce-lockfile

      - name: Compile iOS Runner.app (no codesign)
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flutter build ios --release --no-codesign \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=SENTRY_RELEASE=mail-client-app@${{ github.ref_name }}+${{ github.run_number }}

      - name: Package iOS .ipa from Runner.app
        run: |
          mkdir -p build/ios/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/Payload/
          cd build/ios && zip -r ../icd360s-mail.ipa Payload/

      - name: Upload iOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-build
          path: build/icd360s-mail.ipa
          retention-days: 30

      - name: iOS build summary
        if: always()
        run: |
          {
            echo "## iOS Build Summary"
            echo ""
            if [ -f "build/icd360s-mail.ipa" ]; then
              SIZE=$(du -h build/icd360s-mail.ipa | cut -f1)
              echo "- ✅ icd360s-mail.ipa ($SIZE)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # macOS Build
  # ============================================================
  build-macos:
    name: macOS
    needs: [detect-changes, analyze]
    if: needs.detect-changes.outputs.apple_changed == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Cache Flutter SDK
        id: cache-flutter-macos
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/flutter
          key: flutter-${{ runner.os }}-${{ runner.arch }}-${{ env.FLUTTER_VERSION }}

      - name: Install Flutter (manual)
        if: steps.cache-flutter-macos.outputs.cache-hit != 'true'
        env:
          FL_VER: ${{ env.FLUTTER_VERSION }}
        run: |
          FLUTTER_ZIP="flutter_macos_${FL_VER}-stable.zip"
          FLUTTER_URL="https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/${FLUTTER_ZIP}"
          # Flutter 3.41.9 macOS x64 zip SHA-256. Update in lockstep with
          # FLUTTER_VERSION above; otherwise iOS+macOS jobs fail at
          # integrity check (broke v2.138.6).
          # Fetch latest: curl .../releases_macos.json | jq for the SHA.
          EXPECTED_SHA="eaee3b6aa6da114eb0be843ac53f4f138d3d8827779ff1e4546b345c75b9cba1"
          curl -fsSL -o "$FLUTTER_ZIP" "$FLUTTER_URL"
          ACTUAL_SHA=$(shasum -a 256 "$FLUTTER_ZIP" | cut -d' ' -f1)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Flutter SDK integrity check FAILED!"
            echo "Expected: $EXPECTED_SHA"
            echo "Actual:   $ACTUAL_SHA"
            exit 1
          fi
          echo "✓ Flutter SDK SHA-256 verified"
          unzip -q "$FLUTTER_ZIP" -d "$HOME"
          rm "$FLUTTER_ZIP"

      - name: Add Flutter to PATH
        run: echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter precache
        if: steps.cache-flutter-macos.outputs.cache-hit != 'true'
        run: flutter precache --macos

      - name: Cache pub dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            macos/Pods
            ~/Library/Caches/CocoaPods
          key: pods-macos-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: pods-macos-

      - name: Restore native build hooks (sodium)
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .dart_tool/hooks_runner/
          key: native-hooks-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            native-hooks-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve Flutter dependencies
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flutter pub get --enforce-lockfile

      - name: Configure macOS signing for CI (manual, no team)
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=macosx\*\]" = "Apple Development"/"CODE_SIGN_IDENTITY[sdk=macosx*]" = "-"/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = B42ZX94AKL/DEVELOPMENT_TEAM = ""/g' macos/Runner.xcodeproj/project.pbxproj

      - name: Compile macOS .app bundle (release)
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flutter build macos --release \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=SENTRY_RELEASE=mail-client-app@${{ github.ref_name }}+${{ github.run_number }}

      - name: Ad-hoc sign macOS app
        run: |
          codesign --force --deep --sign - build/macos/Build/Products/Release/icd360s_mail_client.app

      - name: Create macOS .dmg (with /Applications symlink)
        run: |
          DMG_STAGING="$(mktemp -d)"
          cp -R build/macos/Build/Products/Release/icd360s_mail_client.app "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          hdiutil create -volname "ICD360S Mail Client" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO -fs APFS \
            build/icd360s-mail.dmg
          rm -rf "$DMG_STAGING"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-build
          path: build/icd360s-mail.dmg
          retention-days: 30

      - name: macOS build summary
        if: always()
        run: |
          {
            echo "## macOS Build Summary"
            echo ""
            if [ -f "build/icd360s-mail.dmg" ]; then
              SIZE=$(du -h build/icd360s-mail.dmg | cut -f1)
              echo "- ✅ icd360s-mail.dmg ($SIZE)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compute Apple hash
        if: success()
        id: hashes
        run: |
          SHARED_HASH=$(find lib/ pubspec.yaml pubspec.lock assets/ enough_mail_fork/ -type f -print0 2>/dev/null | sort -z | xargs -0 cat 2>/dev/null | sha256sum | cut -d' ' -f1)
          APPLE_HASH=$(find ios/ macos/ -type f -print0 | sort -z | xargs -0 cat | sha256sum | cut -d' ' -f1)
          echo "apple_hash=${SHARED_HASH:0:16}${APPLE_HASH:0:16}" >> "$GITHUB_OUTPUT"

      - name: Save cache marker
        if: success()
        run: |
          mkdir -p .cache-marker-apple
          echo "$GITHUB_SHA" > .cache-marker-apple/sha

      - name: Save Apple build cache
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .cache-marker-apple
          key: build-success-apple-${{ steps.hashes.outputs.apple_hash }}

  # ============================================================
  # Windows Build
  # ============================================================
  build-windows:
    name: Windows
    needs: [detect-changes, analyze]
    if: needs.detect-changes.outputs.windows_changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache native build hooks (sodium)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .dart_tool/hooks_runner/
          key: native-hooks-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            native-hooks-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve Flutter dependencies
        run: flutter pub get --enforce-lockfile

      - name: Compile Windows release binary
        run: |
          flutter build windows --release `
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} `
            --dart-define=SENTRY_RELEASE=mail-client-app@${{ github.ref_name }}+${{ github.run_number }}

      # SECURITY: Download VC++ Redistributable from Microsoft with pinned SHA-256.
      # Previously this binary was committed to the repo (windows/redist/vc_redist.x64.exe),
      # which created a supply-chain risk: anyone who could push to the repo could
      # replace it with a trojanized version that the installer would silently run
      # with admin privileges on every user's machine.
      #
      # Now we fetch it fresh from Microsoft and verify the SHA-256. If the hash
      # changes (Microsoft publishes a new build), this step fails — update the
      # hash here AFTER auditing the new binary.
      - name: Cache VC++ Redistributable
        id: cache-vcredist
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: windows/redist/vc_redist.x64.exe
          key: vcredist-cc0ff0eb1dc3f5188ae6300faef32bf5beeba4bdd6e8e445a9184072096b713b

      - name: Download VC++ Redistributable (verified)
        if: steps.cache-vcredist.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $expectedHash = "cc0ff0eb1dc3f5188ae6300faef32bf5beeba4bdd6e8e445a9184072096b713b"
          $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $dest = "windows/redist/vc_redist.x64.exe"
          New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
          Write-Host "Downloading $url ..."
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          $actualHash = (Get-FileHash $dest -Algorithm SHA256).Hash.ToLower()
          Write-Host "Expected: $expectedHash"
          Write-Host "Actual:   $actualHash"
          if ($actualHash -ne $expectedHash) {
            Write-Error "VC++ Redistributable hash mismatch! Microsoft may have published a new build. Audit the new binary and update the expected hash in build-all-platforms.yml."
            exit 1
          }
          Write-Host "✓ VC++ Redistributable verified"

      - name: Build Inno Setup installer
        run: |
          choco install innosetup -y --no-progress
          iscc windows/installer.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-build
          path: build/installer/*.exe
          retention-days: 30

      - name: Windows build summary
        if: always()
        shell: bash
        run: |
          {
            echo "## 🪟 Windows Build Summary"
            echo ""
            echo "| Artifact | Size | Status |"
            echo "|----------|-----:|:------:|"
            for f in build/installer/*.exe; do
              if [ -f "$f" ]; then
                NAME=$(basename "$f")
                SIZE=$(du -h "$f" | cut -f1)
                echo "| \`$NAME\` | $SIZE | ✅ |"
              fi
            done
            echo ""
            if [ -d "build/windows/x64/runner/Release" ]; then
              BUNDLE_SIZE=$(du -sh build/windows/x64/runner/Release | cut -f1)
              echo "**Flutter bundle**: $BUNDLE_SIZE"
              echo ""
            fi
            echo "### Build steps completed"
            echo "- ✅ Flutter SDK installed"
            echo "- ✅ flutter pub get --enforce-lockfile"
            echo "- ✅ flutter build windows --release"
            echo "- ✅ VC++ Redistributable downloaded + SHA-256 verified"
            echo "- ✅ Inno Setup installer compiled"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compute Windows hash
        if: success()
        id: hashes
        shell: bash
        run: |
          SHARED_HASH=$(find lib/ pubspec.yaml pubspec.lock assets/ enough_mail_fork/ -type f -print0 2>/dev/null | sort -z | xargs -0 cat 2>/dev/null | sha256sum | cut -d' ' -f1)
          WINDOWS_HASH=$(find windows/ -type f -print0 | sort -z | xargs -0 cat | sha256sum | cut -d' ' -f1)
          echo "windows_hash=${SHARED_HASH:0:16}${WINDOWS_HASH:0:16}" >> "$GITHUB_OUTPUT"

      - name: Save cache marker
        if: success()
        shell: bash
        run: |
          mkdir -p .cache-marker-windows
          echo "$GITHUB_SHA" > .cache-marker-windows/sha

      - name: Save Windows build cache
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .cache-marker-windows
          key: build-success-windows-${{ steps.hashes.outputs.windows_hash }}

  # ============================================================
  # SBOM - Generate CycloneDX Software Bill of Materials
  # ============================================================
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate CycloneDX SBOM from pubspec.lock
        run: |
          npm install -g @cyclonedx/cdxgen
          cdxgen -t dart -o sbom.cdx.json .
          echo "✓ SBOM generated ($(wc -l < sbom.cdx.json) lines)"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

  # ============================================================
  # Release - Create GitHub Release on tags v*
  # ============================================================
  release:
    name: Release
    needs: [build-linux, build-android, android-cache-save, build-ios, build-macos, build-windows, sbom]
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          # NOTE: do NOT set fetch-tags: true here.
          # On tag-push events it conflicts with the SHA fetch
          # (actions/checkout#1467: "Cannot fetch both <sha> and refs/tags/<tag>").
          # Annotated tag objects are restored manually below.

      - name: Restore annotated tag object
        # actions/checkout#290 (still OPEN): the default checkout converts
        # annotated tags to LIGHTWEIGHT tags on the runner — the tag message,
        # tagger, and signature are lost. We must re-fetch the real tag object
        # so `git for-each-ref --format='%(contents:body)'` returns the
        # developer-authored message instead of an empty string.
        run: |
          git fetch --force --tags origin \
            "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: artifacts/

      - name: Package artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release

          # Linux
          # Prefer the versioned tar.gz built in the Linux job (proper
          # filename, contains `bundle/` directory). Fall back to
          # re-tar from the raw bundle if the job's tar isn't present.
          TAR=$(find artifacts/linux-build/ -maxdepth 1 -name "*-linux-x64.tar.gz" | head -1)
          if [ -n "$TAR" ]; then
            cp "$TAR" "release/ICD360S-Mail-Client-${VERSION}-linux-x64.tar.gz"
          elif [ -d "artifacts/linux-build/build/linux/x64/release/bundle" ]; then
            tar -czf "release/ICD360S-Mail-Client-${VERSION}-linux-x64.tar.gz" -C artifacts/linux-build/build/linux/x64/release/bundle .
          fi
          # Copy .deb, .rpm, .AppImage
          find artifacts/linux-build/ -maxdepth 1 -name "*.deb" -exec cp {} release/ \; 2>/dev/null || true
          find artifacts/linux-build/ -maxdepth 1 -name "*.rpm" -exec cp {} release/ \; 2>/dev/null || true
          find artifacts/linux-build/ -maxdepth 1 -name "*.AppImage" -exec cp {} release/ \; 2>/dev/null || true

          # Flatpak (single-file bundle)
          if [ -d "artifacts/flatpak-build" ]; then
            FLATPAK=$(find "artifacts/flatpak-build" -maxdepth 1 -name "*.flatpak" | head -1)
            [ -n "$FLATPAK" ] && cp "$FLATPAK" "release/ICD360S-Mail-Client-${VERSION}.flatpak"
          fi

          # Android APKs (all flavors)
          for flavor in universal fdroid googleplay samsung huawei; do
            if [ -d "artifacts/android-${flavor}-apk" ]; then
              find "artifacts/android-${flavor}-apk" -name "*.apk" -exec cp {} release/ \; 2>/dev/null || true
            fi
          done

          # Android AAB (Google Play)
          if [ -d "artifacts/android-googleplay-aab" ]; then
            find "artifacts/android-googleplay-aab" -name "*.aab" -exec cp {} release/ \; 2>/dev/null || true
          fi

          # iOS (.ipa)
          if [ -d "artifacts/ios-build" ]; then
            IPA=$(find "artifacts/ios-build" -name "*.ipa" | head -1)
            [ -n "$IPA" ] && cp "$IPA" "release/ICD360S-Mail-Client-${VERSION}.ipa"
          fi

          # macOS (.dmg)
          if [ -d "artifacts/macos-build" ]; then
            DMG=$(find "artifacts/macos-build" -name "*.dmg" | head -1)
            [ -n "$DMG" ] && cp "$DMG" "release/ICD360S-Mail-Client-${VERSION}.dmg"
          fi

          # Windows (.exe installer)
          if [ -d "artifacts/windows-build" ]; then
            EXE=$(find "artifacts/windows-build" -name "*.exe" | head -1)
            [ -n "$EXE" ] && cp "$EXE" "release/ICD360S-Mail-Client-Setup-${VERSION}.exe"
          fi

          # SBOM (CycloneDX)
          if [ -d "artifacts/sbom-cyclonedx" ]; then
            cp artifacts/sbom-cyclonedx/sbom.cdx.json "release/sbom-${VERSION}.cdx.json"
          fi

          echo "## Release artifacts:" >> "$GITHUB_STEP_SUMMARY"
          ls -lah release/

      # Build release notes from the annotated tag message.
      #
      # Why this is structured the way it is:
      #
      # 1. We use `%(contents:subject)` and `%(contents:body)` instead of
      #    `%(contents)` because the latter includes any PGP/SSH signature
      #    block in the output. The split atoms strip the signature
      #    automatically (verified per git-for-each-ref(1)).
      #
      # 2. We write the body to a FILE and pass it to softprops/action-gh-release
      #    via `body_path`, NOT via `body` + GITHUB_OUTPUT heredoc. GitHub's
      #    own docs say: "If the value is completely arbitrary then you
      #    shouldn't use this format. Write the value to a file instead."
      #    A tag message containing a line that matches the heredoc delimiter
      #    would silently corrupt the GITHUB_OUTPUT file.
      #
      # 3. We hard-fail on lightweight tags. The release pipeline expects
      #    annotated tags created with `git tag -a` (or via GitHub Git API
      #    with type=commit + tag object). If someone pushes a lightweight
      #    tag, fail loudly instead of silently publishing the commit
      #    message as release notes.
      - name: Build release notes from annotated tag
        id: notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          # Guard: require an annotated tag (objecttype == 'tag', not 'commit')
          if [ "$(git cat-file -t "refs/tags/$TAG")" != "tag" ]; then
            echo "::error::Tag $TAG is lightweight; annotated tag (git tag -a) is required"
            exit 1
          fi

          # Signature-safe extraction (strips PGP/SSH signature blocks)
          SUBJECT=$(git for-each-ref --format='%(contents:subject)' "refs/tags/$TAG")
          BODY=$(git for-each-ref --format='%(contents:body)' "refs/tags/$TAG")

          # Write release notes to a file — GitHub docs explicitly recommend
          # this over heredoc-on-GITHUB_OUTPUT for arbitrary content.
          {
            printf '%s\n\n' "$SUBJECT"
            printf '%s' "$BODY"
          } > "${RUNNER_TEMP}/release_notes.md"

          # Expose only the single-line subject via GITHUB_OUTPUT (safe)
          printf 'release_name=%s\n' "$SUBJECT" >> "$GITHUB_OUTPUT"
          printf 'notes_path=%s\n' "${RUNNER_TEMP}/release_notes.md" >> "$GITHUB_OUTPUT"

          echo "::notice::Release notes built from tag $TAG ($(wc -l < ${RUNNER_TEMP}/release_notes.md) lines)"

      # Create GitHub Release using gh CLI directly (Node 24 native).
      #
      # Replaces softprops/action-gh-release@v2.6.1 which is still on
      # node20 upstream and triggers a deprecation warning under the
      # forced-Node24 runtime. gh CLI is pre-installed on all runners
      # and natively uses Node 24, so no warning.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES_PATH: ${{ steps.notes.outputs.notes_path }}
          RELEASE_NAME: ${{ steps.notes.outputs.release_name }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          # Determine prerelease from tag suffix (e.g. v2.24.0-beta.1)
          PRERELEASE_FLAG=""
          case "$TAG" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac

          # Collect all files to upload
          FILES=()
          if [ -d release ]; then
            while IFS= read -r -d '' f; do
              FILES+=("$f")
            done < <(find release -type f -print0)
          fi

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No release artifacts found in release/"
            exit 1
          fi

          echo "::notice::Uploading ${#FILES[@]} artifacts to release $TAG"

          # Idempotent release publish — supports clean first runs AND
          # reruns of partially-failed previous attempts. The previous
          # logic used `gh release create` unconditionally and crashed
          # with "a release with the same tag name already exists" on
          # any rerun (observed v2.30.8 when the Windows job died and
          # the rerun couldn't republish — the existing release had
          # 22/23 assets, missing only Setup-X.X.X.exe).
          #
          # Strategy:
          #   1. If release does NOT exist → `gh release create` (also
          #      uploads all assets in one shot, atomic).
          #   2. If release EXISTS → update notes/title in place via
          #      `gh release edit`, then `gh release upload --clobber`
          #      to overwrite any partial assets from the previous run.
          #
          # `--clobber` is essential: re-uploading the same filename
          # without it returns 422 Unprocessable Entity.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::Release $TAG already exists — updating in place"
            gh release edit "$TAG" \
              --title "$RELEASE_NAME" \
              --notes-file "$NOTES_PATH" \
              ${PRERELEASE_FLAG:+--prerelease}
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            echo "::notice::Creating new release $TAG"
            gh release create "$TAG" \
              --title "$RELEASE_NAME" \
              --notes-file "$NOTES_PATH" \
              --verify-tag \
              $PRERELEASE_FLAG \
              "${FILES[@]}"
          fi





