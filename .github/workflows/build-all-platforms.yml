name: Build All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.29.3"
  JAVA_VERSION: "17"

jobs:
  # ============================================================
  # Detect Changes - Smart cache detection to skip unchanged platforms
  # ============================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      linux_changed: ${{ steps.check.outputs.linux_changed }}
      android_changed: ${{ steps.check.outputs.android_changed }}
      apple_changed: ${{ steps.check.outputs.apple_changed }}
      windows_changed: ${{ steps.check.outputs.windows_changed }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute platform hashes
        id: hashes
        run: |
          # Hash shared code (lib/, pubspec.*, assets/) + enough_mail_fork submodule ref
          FORK_REF=$(git ls-tree HEAD enough_mail_fork 2>/dev/null | awk '{print $3}' || echo "none")
          SHARED_HASH=$(echo "$FORK_REF" | cat - <(find lib/ pubspec.yaml pubspec.lock assets/ -type f 2>/dev/null | sort | xargs cat 2>/dev/null) | sha256sum | cut -d' ' -f1)
          echo "shared_hash=$SHARED_HASH" >> "$GITHUB_OUTPUT"

          # Hash platform-specific dirs
          LINUX_HASH=$(find linux/ -type f | sort | xargs cat | sha256sum | cut -d' ' -f1)
          ANDROID_HASH=$(find android/ -type f | sort | xargs cat | sha256sum | cut -d' ' -f1)
          APPLE_HASH=$(find ios/ macos/ -type f | sort | xargs cat | sha256sum | cut -d' ' -f1)
          WINDOWS_HASH=$(find windows/ -type f | sort | xargs cat | sha256sum | cut -d' ' -f1)

          echo "linux_hash=${SHARED_HASH:0:16}${LINUX_HASH:0:16}" >> "$GITHUB_OUTPUT"
          echo "android_hash=${SHARED_HASH:0:16}${ANDROID_HASH:0:16}" >> "$GITHUB_OUTPUT"
          echo "apple_hash=${SHARED_HASH:0:16}${APPLE_HASH:0:16}" >> "$GITHUB_OUTPUT"
          echo "windows_hash=${SHARED_HASH:0:16}${WINDOWS_HASH:0:16}" >> "$GITHUB_OUTPUT"

      - name: Check Linux cache
        id: cache-linux
        uses: actions/cache/restore@v5
        with:
          path: .cache-marker-linux
          key: build-success-linux-${{ steps.hashes.outputs.linux_hash }}
          lookup-only: true

      - name: Check Android cache
        id: cache-android
        uses: actions/cache/restore@v5
        with:
          path: .cache-marker-android
          key: build-success-android-${{ steps.hashes.outputs.android_hash }}
          lookup-only: true

      - name: Check Apple cache
        id: cache-apple
        uses: actions/cache/restore@v5
        with:
          path: .cache-marker-apple
          key: build-success-apple-${{ steps.hashes.outputs.apple_hash }}
          lookup-only: true

      - name: Check Windows cache
        id: cache-windows
        uses: actions/cache/restore@v5
        with:
          path: .cache-marker-windows
          key: build-success-windows-${{ steps.hashes.outputs.windows_hash }}
          lookup-only: true

      - name: Determine what changed
        id: check
        run: |
          # If cache hit, platform hasn't changed since last successful build
          if [ "${{ steps.cache-linux.outputs.cache-hit }}" = "true" ]; then
            echo "linux_changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Linux: skipping (no changes since last successful build)"
          else
            echo "linux_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Linux: will build"
          fi

          if [ "${{ steps.cache-android.outputs.cache-hit }}" = "true" ]; then
            echo "android_changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Android: skipping (no changes since last successful build)"
          else
            echo "android_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Android: will build"
          fi

          if [ "${{ steps.cache-apple.outputs.cache-hit }}" = "true" ]; then
            echo "apple_changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Apple: skipping (no changes since last successful build)"
          else
            echo "apple_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Apple: will build"
          fi

          if [ "${{ steps.cache-windows.outputs.cache-hit }}" = "true" ]; then
            echo "windows_changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Windows: skipping (no changes since last successful build)"
          else
            echo "windows_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Windows: will build"
          fi

  # ============================================================
  # Linux Build - .deb, .rpm, AppImage
  # ============================================================
  build-linux:
    name: Linux
    needs: detect-changes
    if: needs.detect-changes.outputs.linux_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev rpm ruby-dev
          sudo gem install fpm

      - name: Build Linux
        run: |
          flutter pub get
          flutter build linux --release

      - name: Build .deb package
        run: |
          fpm -s dir -t deb \
            -n icd360s-mail-client \
            -v $(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //;s/+.*//' ) \
            --description "ICD360S Mail Client - Modern email client with threat detection" \
            --maintainer "ICD360S e.V." \
            --url "https://github.com/ICD360S-e-V/mail" \
            --license "Proprietary" \
            --depends libgtk-3-0 \
            --category mail \
            --deb-no-default-config-files \
            build/linux/x64/release/bundle/=/opt/icd360s-mail-client/ \
            linux/icd360s-mail-client.desktop=/usr/share/applications/icd360s-mail-client.desktop

      - name: Build .rpm package
        run: |
          fpm -s dir -t rpm \
            -n icd360s-mail-client \
            -v $(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //;s/+.*//' ) \
            --description "ICD360S Mail Client - Modern email client with threat detection" \
            --maintainer "ICD360S e.V." \
            --url "https://github.com/ICD360S-e-V/mail" \
            --license "Proprietary" \
            --depends gtk3 \
            --category "Applications/Internet" \
            build/linux/x64/release/bundle/=/opt/icd360s-mail-client/ \
            linux/icd360s-mail-client.desktop=/usr/share/applications/icd360s-mail-client.desktop

      - name: Build AppImage
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          # Prepare AppDir
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          cp linux/icd360s-mail-client.desktop AppDir/icd360s-mail-client.desktop
          cp linux/icd360s-mail-client.desktop AppDir/usr/share/applications/
          # Use app logo as icon
          cp assets/logo.png AppDir/icd360s_mail_client.png
          cp assets/logo.png AppDir/usr/share/icons/hicolor/256x256/apps/icd360s_mail_client.png

          # Build AppImage
          ARCH=x86_64 ./appimagetool --no-appstream AppDir ICD360S-Mail-Client-x86_64.AppImage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: |
            build/linux/x64/release/bundle/
            *.deb
            *.rpm
            *.AppImage
          retention-days: 30

      - name: Compute Linux hash
        if: success()
        id: hashes
        run: |
          SHARED_HASH=$(find lib/ pubspec.yaml pubspec.lock assets/ -type f 2>/dev/null | sort | xargs cat 2>/dev/null | sha256sum | cut -d' ' -f1)
          LINUX_HASH=$(find linux/ -type f | sort | xargs cat | sha256sum | cut -d' ' -f1)
          echo "linux_hash=${SHARED_HASH:0:16}${LINUX_HASH:0:16}" >> "$GITHUB_OUTPUT"

      - name: Save cache marker
        if: success()
        run: |
          mkdir -p .cache-marker-linux
          echo "${{ github.sha }}" > .cache-marker-linux/sha

      - name: Save Linux build cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: .cache-marker-linux
          key: build-success-linux-${{ steps.hashes.outputs.linux_hash }}

  # ============================================================
  # Android Build - Per-flavor APKs + AAB, each on dedicated runner
  # ============================================================
  build-android:
    name: Android (${{ matrix.flavor }}${{ matrix.format == 'aab' && ' AAB' || '' }})
    needs: detect-changes
    if: needs.detect-changes.outputs.android_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # APKs per flavor (split-per-abi, obfuscated)
          - flavor: universal
            format: apk
            build_args: "--split-per-abi --obfuscate --split-debug-info=build/symbols"
          - flavor: fdroid
            format: apk
            build_args: "--split-per-abi --obfuscate --split-debug-info=build/symbols"
          - flavor: googleplay
            format: apk
            build_args: "--split-per-abi --obfuscate --split-debug-info=build/symbols"
          - flavor: samsung
            format: apk
            build_args: "--split-per-abi --obfuscate --split-debug-info=build/symbols"
          - flavor: huawei
            format: apk
            build_args: "--split-per-abi --obfuscate --split-debug-info=build/symbols"
          # AAB doar pentru Google Play
          - flavor: googleplay
            format: aab
            build_args: "--obfuscate --split-debug-info=build/symbols"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Build Android ${{ matrix.flavor }} ${{ matrix.format }}
        run: |
          flutter pub get
          flutter build ${{ matrix.format }} --release --flavor ${{ matrix.flavor }} ${{ matrix.build_args }}

      - name: Upload Android ${{ matrix.flavor }} ${{ matrix.format }} artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-${{ matrix.flavor }}-${{ matrix.format }}
          path: |
            build/app/outputs/flutter-apk/*${{ matrix.flavor }}*.apk
            build/app/outputs/bundle/${{ matrix.flavor }}Release/*.aab
            build/symbols/
          retention-days: 30

  # Save Android cache marker (runs after all matrix jobs)
  android-cache-save:
    name: Android Cache Save
    needs: [detect-changes, build-android]
    if: needs.detect-changes.outputs.android_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            lib
            pubspec.yaml
            pubspec.lock
            assets
            android

      - name: Compute Android hash
        id: hashes
        run: |
          SHARED_HASH=$(find lib/ pubspec.yaml pubspec.lock assets/ -type f 2>/dev/null | sort | xargs cat 2>/dev/null | sha256sum | cut -d' ' -f1)
          ANDROID_HASH=$(find android/ -type f | sort | xargs cat | sha256sum | cut -d' ' -f1)
          echo "android_hash=${SHARED_HASH:0:16}${ANDROID_HASH:0:16}" >> "$GITHUB_OUTPUT"

      - name: Save cache marker
        run: |
          mkdir -p .cache-marker-android
          echo "${{ github.sha }}" > .cache-marker-android/sha

      - name: Save Android build cache
        uses: actions/cache/save@v5
        with:
          path: .cache-marker-android
          key: build-success-android-${{ steps.hashes.outputs.android_hash }}

  # ============================================================
  # Apple Build - iOS + macOS (on same runner)
  # ============================================================
  build-apple:
    name: Apple (iOS + macOS)
    needs: detect-changes
    if: needs.detect-changes.outputs.apple_changed == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      # Install Flutter manually on macOS (subosito has tar bug on macOS)
      - name: Install Flutter (manual)
        run: |
          git clone https://github.com/flutter/flutter.git -b ${{ env.FLUTTER_VERSION }} --depth 1 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter precache
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flutter precache --ios --macos
          flutter doctor -v

      - name: Build iOS (no codesign)
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Create iOS .ipa
        run: |
          mkdir -p build/ios/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/Payload/
          cd build/ios && zip -r ../icd360s-mail.ipa Payload/

      - name: Disable macOS code signing
        run: |
          # Disable code signing in project.pbxproj for CI
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=macosx\*\]" = "Apple Development"/"CODE_SIGN_IDENTITY[sdk=macosx*]" = "-"/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = B42ZX94AKL/DEVELOPMENT_TEAM = ""/g' macos/Runner.xcodeproj/project.pbxproj

      - name: Build macOS
        run: |
          flutter build macos --release

      - name: Create macOS .dmg
        run: |
          hdiutil create -volname "ICD360S Mail Client" \
            -srcfolder build/macos/Build/Products/Release/icd360s_mail_client.app \
            -ov -format UDZO \
            build/icd360s-mail.dmg

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-build
          path: build/icd360s-mail.ipa
          retention-days: 30

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: build/icd360s-mail.dmg
          retention-days: 30

      - name: Compute Apple hash
        if: success()
        id: hashes
        run: |
          SHARED_HASH=$(find lib/ pubspec.yaml pubspec.lock assets/ -type f 2>/dev/null | sort | xargs cat 2>/dev/null | sha256sum | cut -d' ' -f1)
          APPLE_HASH=$(find ios/ macos/ -type f | sort | xargs cat | sha256sum | cut -d' ' -f1)
          echo "apple_hash=${SHARED_HASH:0:16}${APPLE_HASH:0:16}" >> "$GITHUB_OUTPUT"

      - name: Save cache marker
        if: success()
        run: |
          mkdir -p .cache-marker-apple
          echo "${{ github.sha }}" > .cache-marker-apple/sha

      - name: Save Apple build cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: .cache-marker-apple
          key: build-success-apple-${{ steps.hashes.outputs.apple_hash }}

  # ============================================================
  # Windows Build
  # ============================================================
  build-windows:
    name: Windows
    needs: detect-changes
    if: needs.detect-changes.outputs.windows_changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Build Windows
        run: |
          flutter pub get
          flutter build windows --release

      - name: Build Inno Setup installer
        run: |
          choco install innosetup -y --no-progress
          iscc windows/installer.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: build/installer/*.exe
          retention-days: 30

      - name: Compute Windows hash
        if: success()
        id: hashes
        shell: bash
        run: |
          SHARED_HASH=$(find lib/ pubspec.yaml pubspec.lock assets/ -type f 2>/dev/null | sort | xargs cat 2>/dev/null | sha256sum | cut -d' ' -f1)
          WINDOWS_HASH=$(find windows/ -type f | sort | xargs cat | sha256sum | cut -d' ' -f1)
          echo "windows_hash=${SHARED_HASH:0:16}${WINDOWS_HASH:0:16}" >> "$GITHUB_OUTPUT"

      - name: Save cache marker
        if: success()
        shell: bash
        run: |
          mkdir -p .cache-marker-windows
          echo "${{ github.sha }}" > .cache-marker-windows/sha

      - name: Save Windows build cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: .cache-marker-windows
          key: build-success-windows-${{ steps.hashes.outputs.windows_hash }}

  # ============================================================
  # Deploy to VPS - Upload all artifacts to mail.icd360s.de
  # ============================================================
  deploy:
    name: Deploy to VPS
    needs: [build-linux, build-android, android-cache-save, build-apple, build-windows]
    if: always() && github.ref == 'refs/heads/main' && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Prepare deploy structure
        run: |
          DEPLOY_DIR="deploy/downloads/mail"

          # Android - per flavor directories
          for flavor in universal fdroid googleplay samsung huawei; do
            mkdir -p "${DEPLOY_DIR}/android/${flavor}"
            if [ -d "artifacts/android-${flavor}-apk" ]; then
              APK=$(find "artifacts/android-${flavor}-apk" -name "*.apk" | head -1)
              if [ -n "$APK" ]; then
                cp "$APK" "${DEPLOY_DIR}/android/${flavor}/icd360s-mail.apk"
              fi
            fi
          done

          # Google Play AAB
          if [ -d "artifacts/android-googleplay-aab" ]; then
            AAB=$(find "artifacts/android-googleplay-aab" -name "*.aab" | head -1)
            if [ -n "$AAB" ]; then
              cp "$AAB" "${DEPLOY_DIR}/android/googleplay/icd360s-mail.aab"
            fi
          fi

          # Linux
          mkdir -p "${DEPLOY_DIR}/linux"
          if [ -d "artifacts/linux-build" ]; then
            # tar.gz from bundle
            if [ -d "artifacts/linux-build/build/linux/x64/release/bundle" ]; then
              tar -czf "${DEPLOY_DIR}/linux/icd360s-mail-linux.tar.gz" -C artifacts/linux-build/build/linux/x64/release/bundle .
            fi
            # .deb
            DEB=$(find "artifacts/linux-build" -maxdepth 1 -name "*.deb" | head -1)
            [ -n "$DEB" ] && cp "$DEB" "${DEPLOY_DIR}/linux/icd360s-mail.deb"
            # .rpm
            RPM=$(find "artifacts/linux-build" -maxdepth 1 -name "*.rpm" | head -1)
            [ -n "$RPM" ] && cp "$RPM" "${DEPLOY_DIR}/linux/icd360s-mail.rpm"
            # AppImage
            APPIMAGE=$(find "artifacts/linux-build" -maxdepth 1 -name "*.AppImage" | head -1)
            [ -n "$APPIMAGE" ] && cp "$APPIMAGE" "${DEPLOY_DIR}/linux/icd360s-mail.AppImage"
          fi

          # Windows (.exe installer)
          mkdir -p "${DEPLOY_DIR}/windows"
          if [ -d "artifacts/windows-build" ]; then
            EXE=$(find "artifacts/windows-build" -name "*.exe" | head -1)
            [ -n "$EXE" ] && cp "$EXE" "${DEPLOY_DIR}/windows/icd360s-mail-setup.exe"
          fi

          # macOS (.dmg)
          mkdir -p "${DEPLOY_DIR}/macos"
          if [ -d "artifacts/macos-build" ]; then
            DMG=$(find "artifacts/macos-build" -name "*.dmg" | head -1)
            [ -n "$DMG" ] && cp "$DMG" "${DEPLOY_DIR}/macos/icd360s-mail.dmg"
          fi

          # iOS (.ipa)
          mkdir -p "${DEPLOY_DIR}/ios"
          if [ -d "artifacts/ios-build" ]; then
            IPA=$(find "artifacts/ios-build" -name "*.ipa" | head -1)
            [ -n "$IPA" ] && cp "$IPA" "${DEPLOY_DIR}/ios/icd360s-mail.ipa"
          fi

          echo "## Deploy structure:" >> "$GITHUB_STEP_SUMMARY"
          find deploy/ -type f | sort | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "- ${f#deploy/} ($SIZE)" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p 36000 mail.icd360s.de >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload to VPS
        run: |
          # Create directory structure on server
          ssh -i ~/.ssh/vps_key -p 36000 root@mail.icd360s.de \
            "mkdir -p /var/www/html/downloads/mail/{android/{universal,fdroid,googleplay,samsung,huawei},linux,windows,macos,ios}"

          # Upload all files
          scp -i ~/.ssh/vps_key -P 36000 -r deploy/downloads/mail/* root@mail.icd360s.de:/var/www/html/downloads/mail/

      - name: Verify deploy
        run: |
          echo "## Deployed files on server:" >> "$GITHUB_STEP_SUMMARY"
          ssh -i ~/.ssh/vps_key -p 36000 root@mail.icd360s.de \
            "find /var/www/html/downloads/mail -type f | sort" >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/vps_key

  # ============================================================
  # Release - Create GitHub Release on tags v*
  # ============================================================
  release:
    name: Release
    needs: [build-linux, build-android, android-cache-save, build-apple, build-windows]
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Package artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release

          # Linux
          if [ -d "artifacts/linux-build/build/linux/x64/release/bundle" ]; then
            tar -czf "release/ICD360S-Mail-Client-${VERSION}-linux-x64.tar.gz" -C artifacts/linux-build/build/linux/x64/release/bundle .
          fi
          # Copy .deb, .rpm, .AppImage
          find artifacts/linux-build/ -maxdepth 1 -name "*.deb" -exec cp {} release/ \; 2>/dev/null || true
          find artifacts/linux-build/ -maxdepth 1 -name "*.rpm" -exec cp {} release/ \; 2>/dev/null || true
          find artifacts/linux-build/ -maxdepth 1 -name "*.AppImage" -exec cp {} release/ \; 2>/dev/null || true

          # Android APKs (all flavors)
          for flavor in universal fdroid googleplay samsung huawei; do
            if [ -d "artifacts/android-${flavor}-apk" ]; then
              find "artifacts/android-${flavor}-apk" -name "*.apk" -exec cp {} release/ \; 2>/dev/null || true
            fi
          done

          # Android AAB (Google Play)
          if [ -d "artifacts/android-googleplay-aab" ]; then
            find "artifacts/android-googleplay-aab" -name "*.aab" -exec cp {} release/ \; 2>/dev/null || true
          fi

          # iOS (.ipa)
          if [ -d "artifacts/ios-build" ]; then
            IPA=$(find "artifacts/ios-build" -name "*.ipa" | head -1)
            [ -n "$IPA" ] && cp "$IPA" "release/ICD360S-Mail-Client-${VERSION}.ipa"
          fi

          # macOS (.dmg)
          if [ -d "artifacts/macos-build" ]; then
            DMG=$(find "artifacts/macos-build" -name "*.dmg" | head -1)
            [ -n "$DMG" ] && cp "$DMG" "release/ICD360S-Mail-Client-${VERSION}.dmg"
          fi

          # Windows (.exe installer)
          if [ -d "artifacts/windows-build" ]; then
            EXE=$(find "artifacts/windows-build" -name "*.exe" | head -1)
            [ -n "$EXE" ] && cp "$EXE" "release/ICD360S-Mail-Client-Setup-${VERSION}.exe"
          fi

          echo "## Release artifacts:" >> "$GITHUB_STEP_SUMMARY"
          ls -lah release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
