app-id: de.icd360s.mailclient
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: icd360s_mail_client

finish-args:
  # IPC + network
  - --share=ipc
  - --share=network

  # Display server
  - --socket=wayland
  - --socket=fallback-x11

  # Hardware acceleration (Mesa/intel/amdgpu via /dev/dri)
  - --device=dri

  # Audio (notification chimes, no-op on systems without pulse)
  - --socket=pulseaudio

  # Filesystem access — XDG dirs only, NOT host-wide
  # User-attached files come via xdg-portal (FileChooser) which uses
  # OpenURI / OpenFile portals and does NOT need broad fs access.
  - --filesystem=xdg-download
  - --filesystem=xdg-documents

  # System-tray support across desktops
  # Plasma 6 uses StatusNotifierWatcher; older Plasma/GNOME extensions
  # fall back to ayatana/canonical indicator buses. window_manager
  # 0.5.1 does NOT integrate any of these directly (it just creates
  # the toplevel window), so these talk-names are dormant unless we
  # add tray_manager later — kept proactively so a future tray addition
  # doesn't require a Flatpak permission update + re-install.
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.ayatana.indicator.application
  - --talk-name=com.canonical.indicator.application

  # Desktop notifications (flutter_local_notifications via libnotify)
  - --talk-name=org.freedesktop.Notifications

  # Secret storage via xdg-desktop-portal — libsecret 0.20.5+ (included
  # in Freedesktop runtime 24.08) auto-detects the sandbox and switches
  # to `org.freedesktop.portal.Secret`, which returns a per-application
  # master secret from gnome-keyring-daemon over a file descriptor;
  # libsecret then seals credentials into a local encrypted file in the
  # app's XDG data dir. This decouples us from whether the user's login
  # keyring on the host is unlocked — critical for RDP/xrdp sessions
  # where PAM does not auto-unlock the host keyring and any direct
  # `org.freedesktop.secrets` call throws `PlatformException(keyring_locked)`.
  #
  # Do NOT re-add `--talk-name=org.freedesktop.secrets` (or the kwalletd
  # equivalents) — with those present, libsecret prefers the host
  # Secret Service and never falls back to the portal, so RDP users hit
  # the exact locked-keyring failure this manifest is meant to avoid.
  # See flatpak/xdg-desktop-portal#359 and GNOME/dueno's write-up.
  #
  # The portal itself is reached via `org.freedesktop.portal.Desktop`,
  # which Flatpak auto-injects into every sandbox — no explicit
  # --talk-name needed for the portal bus.

  # NOTE: removed --talk-name=org.freedesktop.portal.Background.
  # Declaring it without implementing the Background portal handshake
  # (RequestBackground / status updates) makes xdg-desktop-portal flag
  # the app as a "background app without permission" and kill it after
  # ~10s of running — manifesting as: window appears, spins, then dies
  # with no log. See flatpak/xdg-desktop-portal#664 and flatpak#5427.
  # Re-add together with the portal handshake when adding autostart.

  # Open mailto: links from other apps
  - --talk-name=org.freedesktop.portal.OpenURI

modules:
  # Pulled from Flathub's shared-modules repo (cloned in CI) — never
  # bump the manifest's pinned subpaths or invent SHA-256 here. Always
  # use the upstream-maintained module definitions.
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

  # libsecret-1.so.0 — required at RUNTIME by flutter_secure_storage_linux.
  # The 24.08 runtime does NOT ship libsecret (earlier comment was wrong);
  # without this module the plugin throws an unhandled PlatformException
  # at app init ("Failed to unlock the keyring") and the app exits before
  # showing a window. Same root cause as ente-io/ente#6564.
  - shared-modules/libsecret/libsecret.json

  - name: icd360s-mail-client
    buildsystem: simple
    build-commands:
      # Stage the Flutter bundle (downloaded as `linux-bundle` artifact
      # in CI, present at ./bundle/ inside the manifest's working dir)
      - mkdir -p /app/bin
      - cp -r bundle/* /app/bin/
      - chmod +x /app/bin/icd360s_mail_client
      # Desktop integration
      - install -Dm644 de.icd360s.mailclient.desktop /app/share/applications/de.icd360s.mailclient.desktop
      - install -Dm644 de.icd360s.mailclient.metainfo.xml /app/share/metainfo/de.icd360s.mailclient.metainfo.xml
      # Icon — logo.png is 512x512 so install in matching hicolor dir
      - install -Dm644 de.icd360s.mailclient.png /app/share/icons/hicolor/512x512/apps/de.icd360s.mailclient.png
    sources:
      - type: dir
        path: ./bundle
        dest: bundle
      - type: file
        path: ./de.icd360s.mailclient.desktop
      - type: file
        path: ./de.icd360s.mailclient.metainfo.xml
      - type: file
        path: ./de.icd360s.mailclient.png
