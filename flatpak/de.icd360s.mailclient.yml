app-id: de.icd360s.mailclient
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: launcher.sh

finish-args:
  # IPC + network
  - --share=ipc
  - --share=network

  # Display server
  - --socket=wayland
  - --socket=fallback-x11

  # Hardware acceleration (Mesa/intel/amdgpu via /dev/dri)
  - --device=dri

  # Audio (notification chimes, no-op on systems without pulse)
  - --socket=pulseaudio

  # Filesystem access — XDG dirs only, NOT host-wide
  # User-attached files come via xdg-portal (FileChooser) which uses
  # OpenURI / OpenFile portals and does NOT need broad fs access.
  - --filesystem=xdg-download
  - --filesystem=xdg-documents

  # System-tray support across desktops
  # Plasma 6 uses StatusNotifierWatcher; older Plasma/GNOME extensions
  # fall back to ayatana/canonical indicator buses. window_manager
  # 0.5.1 does NOT integrate any of these directly (it just creates
  # the toplevel window), so these talk-names are dormant unless we
  # add tray_manager later — kept proactively so a future tray addition
  # doesn't require a Flatpak permission update + re-install.
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.ayatana.indicator.application
  - --talk-name=com.canonical.indicator.application

  # Desktop notifications (flutter_local_notifications via libnotify)
  - --talk-name=org.freedesktop.Notifications

  # Secret storage — the app ships its OWN gnome-keyring-daemon and lets
  # it own `org.freedesktop.secrets` on the sandbox session bus (see
  # launcher.sh + gcr-3/gnome-keyring modules below). Rationale:
  #
  # - PR #162 tried removing this talk-name so libsecret would fall back
  #   to `org.freedesktop.portal.Secret`. That path needs an
  #   `org.freedesktop.impl.portal.Secret` backend on the host, which
  #   xdg-desktop-portal-xapp / -xfce (Linux Mint XFCE default) do NOT
  #   implement — so libsecret found nothing and still failed.
  # - PAM-based unlock of the host keyring doesn't happen over xrdp/VNC
  #   (no cleartext login password), so any dependency on the host's
  #   gnome-keyring is unusable in RDP sessions.
  #
  # Owning the name inside the sandbox makes host-side desktop / portal /
  # PAM state irrelevant — the daemon is per-installation and per-user,
  # unlocked with an empty password (the Flatpak per-app data dir is
  # already the security boundary; a second layer would just be a UX tax).
  - --own-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.secrets

  # NOTE: removed --talk-name=org.freedesktop.portal.Background.
  # Declaring it without implementing the Background portal handshake
  # (RequestBackground / status updates) makes xdg-desktop-portal flag
  # the app as a "background app without permission" and kill it after
  # ~10s of running — manifesting as: window appears, spins, then dies
  # with no log. See flatpak/xdg-desktop-portal#664 and flatpak#5427.
  # Re-add together with the portal handshake when adding autostart.

  # Open mailto: links from other apps
  - --talk-name=org.freedesktop.portal.OpenURI

modules:
  # Pulled from Flathub's shared-modules repo (cloned in CI) — never
  # bump the manifest's pinned subpaths or invent SHA-256 here. Always
  # use the upstream-maintained module definitions.
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

  # libsecret-1.so.0 — required at RUNTIME by flutter_secure_storage_linux.
  # The 24.08 runtime does NOT ship libsecret (earlier comment was wrong);
  # without this module the plugin throws an unhandled PlatformException
  # at app init ("Failed to unlock the keyring") and the app exits before
  # showing a window. Same root cause as ente-io/ente#6564.
  - shared-modules/libsecret/libsecret.json

  # gcr-3 — hard dep of gnome-keyring-daemon (gcr-base-3 ≥ 3.27.90 and
  # gck-1 ≥ 3.3.4, both provided by this tarball). Built minimal: no GTK,
  # no docs, no introspection, no ssh-agent — only the crypto/PKCS#11
  # bits gnome-keyring links against. gcr-4 would be nicer but
  # gnome-keyring 50 still pulls the 3.x branch.
  - name: gcr
    buildsystem: meson
    config-opts:
      - -Dgtk=false
      - -Dgtk_doc=false
      - -Dintrospection=false
      - -Dssh_agent=false
      - -Dsystemd=disabled
    sources:
      - type: archive
        url: https://download.gnome.org/sources/gcr/3.41/gcr-3.41.2.tar.xz
        sha256: bad10f3c553a0e1854649ab59c5b2434da22ca1a54ae6138f1f53961567e1ab7

  # gnome-keyring — provides the `gnome-keyring-daemon` binary launcher.sh
  # spawns before the Flutter app. Built without PAM (no login helper needed
  # inside a sandbox) and without libcap-ng (unavailable in 24.08 runtime).
  # `--components=secrets` at runtime restricts it to the Secret Service
  # role — no ssh-agent, no pkcs11 store.
  - name: gnome-keyring
    buildsystem: meson
    config-opts:
      - -Dpam=false
      - -Dssh-agent=false
      - -Dselinux=disabled
      - -Dsystemd=disabled
      - -Dlibcap-ng=disabled
    sources:
      - type: archive
        url: https://download.gnome.org/sources/gnome-keyring/50/gnome-keyring-50.0.tar.xz
        sha256: cbd72062c53c9702bc2c4733991ad5f051ca682882b30905a2829bcf1a8ecc7c

  - name: icd360s-mail-client
    buildsystem: simple
    build-commands:
      # Stage the Flutter bundle (downloaded as `linux-bundle` artifact
      # in CI, present at ./bundle/ inside the manifest's working dir)
      - mkdir -p /app/bin
      - cp -r bundle/* /app/bin/
      - chmod +x /app/bin/icd360s_mail_client
      # Launcher wrapper that starts gnome-keyring-daemon before exec'ing
      # the Flutter binary — this is what the manifest's `command:` points
      # at, so it runs on every app start.
      - install -Dm755 launcher.sh /app/bin/launcher.sh
      # Desktop integration
      - install -Dm644 de.icd360s.mailclient.desktop /app/share/applications/de.icd360s.mailclient.desktop
      - install -Dm644 de.icd360s.mailclient.metainfo.xml /app/share/metainfo/de.icd360s.mailclient.metainfo.xml
      # Icon — logo.png is 512x512 so install in matching hicolor dir
      - install -Dm644 de.icd360s.mailclient.png /app/share/icons/hicolor/512x512/apps/de.icd360s.mailclient.png
    sources:
      - type: dir
        path: ./bundle
        dest: bundle
      - type: file
        path: ./launcher.sh
      - type: file
        path: ./de.icd360s.mailclient.desktop
      - type: file
        path: ./de.icd360s.mailclient.metainfo.xml
      - type: file
        path: ./de.icd360s.mailclient.png
